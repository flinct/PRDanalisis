  <script>
    // Block Live Server auto-reload when saving TSV/JSON files.
    // livereload.js uses `socket.onmessage = fn` (property assignment, not addEventListener),
    // so we intercept the onmessage setter on every WebSocket connected to the live-reload port.
    (function() {
      const NativeWS = window.WebSocket;

      function PatchedWS(url, protocols) {
        const ws = protocols != null ? new NativeWS(url, protocols) : new NativeWS(url);
        const isLR = typeof url === 'string' && (url.includes('livereload') || url.includes('5500'));
        if (isLR) {
          let _handler = null;
          let _listenerAdded = false;
          Object.defineProperty(ws, 'onmessage', {
            get() { return _handler; },
            set(fn) {
              _handler = fn;
              if (!_listenerAdded) {
                _listenerAdded = true;
                NativeWS.prototype.addEventListener.call(ws, 'message', function(evt) {
                  try { const d = JSON.parse(evt.data); if (d && d.command === 'reload') return; } catch(e) {}
                  if (_handler) _handler.call(ws, evt);
                });
              }
            },
            configurable: true
          });
        }
        return ws;
      }

      PatchedWS.prototype = NativeWS.prototype;
      PatchedWS.CONNECTING = 0; PatchedWS.OPEN = 1; PatchedWS.CLOSING = 2; PatchedWS.CLOSED = 3;
      window.WebSocket = PatchedWS;

      // Backup: override location.reload for any scripted reload attempt
      try {
        Object.defineProperty(Location.prototype, 'reload', {
          value: function() { console.info('[QA Browser] scripted reload blocked'); },
          configurable: true, writable: true
        });
      } catch(e) {}
    })();
  </script>

<script type="text/babel">

  /* eslint-enable */

  function applyThemeVars(theme) {
    const root = document.documentElement;
    for (const [k, v] of Object.entries(theme.vars)) {
      root.style.setProperty(k, v);
    }
  }

  // ─── SECTION CONFIG ───────────────────────────────────────────────────────────
  const KNOWN_SECTIONS = [
    { id:'brd',  label:'BRD',        folderName:'BRD',  color:'var(--sec-brd)',  dimBg:'var(--sec-brd-bg)',  dimBd:'var(--sec-brd-bd)'  },
    { id:'prd',  label:'PRD',        folderName:'PRD',  color:'var(--sec-prd)',  dimBg:'var(--sec-prd-bg)',  dimBd:'var(--sec-prd-bd)'  },
    { id:'test', label:'Test Cases', folderName:'Test', color:'var(--sec-test)', dimBg:'var(--sec-test-bg)', dimBd:'var(--sec-test-bd)' },
  ];
  const EXTRA_COLORS = [
    { color:'#f59e0b', dimBg:'#1a0f00', dimBd:'#92400e' },
    { color:'#ec4899', dimBg:'#1a001a', dimBd:'#831843' },
    { color:'#06b6d4', dimBg:'#001a1e', dimBd:'#0e7490' },
    { color:'#84cc16', dimBg:'#0d1a00', dimBd:'#365314' },
    { color:'#f97316', dimBg:'#1a0800', dimBd:'#9a3412' },
    { color:'#a78bfa', dimBg:'#0d0720', dimBd:'#4c1d95' },
  ];
  const EXCLUDED_FOLDERS = new Set(['port', 'node_modules']);

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  const STATUS_OPTIONS = ['Passed', 'Failed', 'On Test', 'Need to Test', ''];
  const ENV = ['DEV', 'Staging', 'Prod'];
  const SCHEMA_VERSION = 1;

  const STATUS_STYLE = {
    'passed':       { bg: '#052e16', fg: '#4ade80', bd: '#166534' },
    'failed':       { bg: '#2d0e0e', fg: '#f87171', bd: '#7f1d1d' },
    'on test':      { bg: '#0c1a3a', fg: '#60a5fa', bd: '#1e3a5f' },
    'need to test': { bg: '#2a1a04', fg: '#fbbf24', bd: '#713f12' },
  };
  function sStyle(val = '') {
    const s = STATUS_STYLE[(val||'').toLowerCase().trim()] || { bg:'var(--elevated-bg)', fg:'var(--text-5)', bd:'var(--border-1)' };
    return { background:s.bg, color:s.fg, border:`1px solid ${s.bd}`, padding:'2px 9px', borderRadius:20, fontSize:10, fontWeight:700, whiteSpace:'nowrap', display:'inline-block' };
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  function nowISO() { return new Date().toISOString(); }
  function fmtDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }
  function uid() { return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  // ─── MODELS ──────────────────────────────────────────────────────────────────
  const EMPTY_EXEC_ROW = (rowKey = '1') => ({
    rowKey,
    actual: '',
    status: { DEV: '', Staging: '', Prod: '' },
  });

  const EMPTY_EXEC = (count = 1) => ({
    notes: '',
    overallStatus: { DEV: '', Staging: '', Prod: '' },
    results: Array.from({ length: count }, (_, i) => EMPTY_EXEC_ROW(String(i + 1))),
    updatedAt: null,
  });

  const EMPTY_TC = () => ({
    id: '', scenario: '', precondition: '', description: '', url: '',
    testType: 'POSITIVE', tester: '', createdBy: '', createDate: '',
    steps: [''],
    expectedResults: [{ key: '1', expected: '' }],
    exec: EMPTY_EXEC(1),
    history: [],
  });

  // ─── PARSERS ─────────────────────────────────────────────────────────────────
  function parseLine(line, sep = '\t') {
    const out = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch === sep && !inQ) { out.push(cur); cur=''; }
      else cur += ch;
    }
    out.push(cur);
    return out;
  }

  function isCardFmt(lines) { return lines.slice(0,30).some(l => l[0]==='Test ID'); }

  function parseBlock(rows) {
    const tc = {
      id:'', scenario:'', precondition:'', description:'', url:'',
      testType:'POSITIVE', tester:'', createdBy:'', createDate:'',
      steps: [],
      expectedResults: [],
      exec: null,
      history: [],
      _legacyExec: {
        notes: '',
        overallStatus: { DEV:'', Staging:'', Prod:'' },
        results: [],
      },
    };
    let inResults = false;

    for (const c of rows) {
      while (c.length < 11) c.push('');
      if (!c.some(x => x.trim())) continue;
      switch (c[0]) {
        case 'Test ID':
          tc.id = c[1]||'';
          if (c[5]==='Note:') tc._legacyExec.notes = c[6]||'';
          tc._legacyExec.overallStatus.DEV      = c[8]||'';
          tc._legacyExec.overallStatus.Staging  = c[9]||'';
          tc._legacyExec.overallStatus.Prod     = c[10]||'';
          break;
        case 'Create at':
          tc.createDate=c[3]||''; tc.createdBy=c[6]||''; tc.tester=c[8]||'';
          break;
        case 'Scenario':
          tc.scenario=c[3]||''; tc.precondition=c[6]||'';
          break;
        case 'Url':
          tc.url=c[3]||''; tc.description=c[6]||'';
          break;
        case 'Steps':
          tc.testType=c[6]||'';
          if (c[3]) tc.steps.push(c[3]);
          break;
        default:
          if (!c[0]) {
            if (c[5]==='Status Response') { inResults=true; }
            else if (!inResults && c[2] && c[3]) { tc.steps.push(c[3]); }
            else if (inResults && c[6]) {
              const rowKey = String(tc.expectedResults.length + 1);
              tc.expectedResults.push({ key: rowKey, expected: c[6]||'' });
              tc._legacyExec.results.push({
                rowKey,
                actual: c[7]||'',
                status: { DEV: c[8]||'', Staging: c[9]||'', Prod: c[10]||'' },
              });
            }
          }
      }
    }

    if (tc.steps.length === 0) tc.steps = [''];
    if (tc.expectedResults.length === 0) tc.expectedResults = [{ key:'1', expected:'' }];
    return tc;
  }

  function parseCardFormat(lines) {
    const cases = []; let i = 0;
    while (i < lines.length) {
      if (lines[i][0]==='Test ID') {
        let j = i+1;
        while (j < lines.length && lines[j][0]!=='Test ID') j++;
        cases.push(parseBlock(lines.slice(i,j))); i=j;
      } else i++;
    }
    return cases;
  }

  function parseFlatFormat(lines) {
    const ne = lines.filter(l => l.some(c=>c.trim()));
    return ne.length ? { headers:ne[0], rows:ne.slice(1) } : { headers:[], rows:[] };
  }

  function parseFile(text, ext) {
    const sep = ext==='csv' ? ',' : '\t';
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').map(l=>parseLine(l,sep));
    const ne = lines.filter(l=>l.some(c=>c.trim()));
    if (!ne.length) return { type:'empty' };
    if (isCardFmt(ne)) return { type:'card', cases:parseCardFormat(ne) };
    return { type:'flat', ...parseFlatFormat(ne) };
  }

  // ─── VERSION HELPERS ─────────────────────────────────────────────────────────
  function getActiveVersion(execData) {
    if (!execData) return 'v1';
    if (execData.activeVersion) return execData.activeVersion;
    if (execData.cases && !execData.versions) return 'v1';
    const keys = Object.keys(execData.versions || {});
    return keys.length > 0 ? keys[keys.length - 1] : 'v1';
  }

  function getVersionCases(execData, versionId) {
    if (!execData) return null;
    if (execData.versions?.[versionId]?.cases) return execData.versions[versionId].cases;
    if (!execData.versions && execData.cases && versionId === 'v1') return execData.cases;
    return null;
  }

  // ─── MERGE ───────────────────────────────────────────────────────────────────
  function mergeExecIntoCases(cases, execData, versionId) {
    const hasJsonFile = execData !== null;
    const versionCases = getVersionCases(execData, versionId);

    return cases.map(tc => {
      const execCase = versionCases?.[tc.id];

      if (execCase?.current) {
        const cur = execCase.current;
        const execResults = tc.expectedResults.map(er => {
          const found = (cur.results||[]).find(r => r.rowKey===er.key);
          return found
            ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'', Staging:'', Prod:'', ...found.status } }
            : EMPTY_EXEC_ROW(er.key);
        });
        return {
          ...tc,
          exec: {
            notes: cur.notes||'',
            overallStatus: { DEV:'', Staging:'', Prod:'', ...cur.overallStatus },
            results: execResults,
            updatedAt: cur.updatedAt||null,
          },
          history: execCase.history||[],
        };
      }

      if (!hasJsonFile) {
        const leg = tc._legacyExec;
        const execResults = tc.expectedResults.map((er, i) => {
          const found = leg?.results?.[i];
          return found
            ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'', Staging:'', Prod:'', ...found.status } }
            : EMPTY_EXEC_ROW(er.key);
        });
        return {
          ...tc,
          exec: {
            notes: leg?.notes||'',
            overallStatus: { DEV:'', Staging:'', Prod:'', ...(leg?.overallStatus||{}) },
            results: execResults,
            updatedAt: null,
          },
          history: [],
        };
      }

      return {
        ...tc,
        exec: EMPTY_EXEC(tc.expectedResults.length),
        history: [],
      };
    });
  }

  // ─── EXEC JSON BUILDER ───────────────────────────────────────────────────────
  function tcToSnapshot(tc) {
    return {
      testType:        tc.testType || '',
      tester:          tc.tester || '',
      createDate:      tc.createDate || '',
      scenario:        tc.scenario || '',
      precondition:    tc.precondition || '',
      description:     tc.description || '',
      url:             tc.url || '',
      steps:           [...(tc.steps || [])],
      expectedResults: (tc.expectedResults || []).map(er => ({ ...er })),
      notes:           tc.exec?.notes || '',
      overallStatus:   { DEV:'', Staging:'', Prod:'', ...(tc.exec?.overallStatus||{}) },
      results:         (tc.exec?.results || []).map(r => ({
        rowKey: r.rowKey,
        actual: r.actual || '',
        status: { DEV:r.status?.DEV||'', Staging:r.status?.Staging||'', Prod:r.status?.Prod||'' },
      })),
      updatedAt: tc.exec?.updatedAt || null,
    };
  }

  function hasAnyChange(oldSnap, newSnap) {
    if (!oldSnap) return true;
    const defFields = ['testType','tester','createDate','scenario','precondition','description','url'];
    for (const f of defFields) {
      if ((oldSnap[f]||'') !== (newSnap[f]||'')) return true;
    }
    const os = oldSnap.steps||[], ns = newSnap.steps||[];
    if (os.length !== ns.length || os.some((s,i) => s !== ns[i])) return true;
    const oe = oldSnap.expectedResults||[], ne = newSnap.expectedResults||[];
    if (oe.length !== ne.length || oe.some((e,i) => (e.expected||'') !== (ne[i]?.expected||''))) return true;
    if ((oldSnap.notes||'') !== (newSnap.notes||'')) return true;
    for (const e of ENV) {
      if ((oldSnap.overallStatus?.[e]||'') !== (newSnap.overallStatus?.[e]||'')) return true;
    }
    const or = oldSnap.results||[], nr = newSnap.results||[];
    if (or.length !== nr.length) return true;
    for (let i=0; i<or.length; i++) {
      if ((or[i].actual||'') !== (nr[i].actual||'')) return true;
      for (const e of ENV) {
        if ((or[i].status?.[e]||'') !== (nr[i].status?.[e]||'')) return true;
      }
    }
    return false;
  }

  function buildExecJSON(cases, prevExecData, sourceFile, sourceFileName, versionId) {
    const now = nowISO();
    const prevVersionCases = getVersionCases(prevExecData, versionId) || {};
    const newCasesMap = {};

    for (const tc of cases) {
      if (!tc.id) continue;
      const prevCase = prevVersionCases[tc.id];
      const oldFull = prevCase?.current || null;
      const newFull = tcToSnapshot(tc);
      const prevHistory = prevCase?.history || [];
      let newHistory = [...prevHistory];

      if (hasAnyChange(oldFull, newFull)) {
        if (oldFull) {
          newHistory.push({
            eventId: uid(),
            action: tc._isReset ? 'reset' : 'update',
            at: now,
            ...(tc._resetReason ? { reason: tc._resetReason } : {}),
            snapshot: oldFull,
          });
        }
        newFull.updatedAt = now;
      }

      newCasesMap[tc.id] = { testcaseId: tc.id, current: newFull, history: newHistory };
    }

    let existingVersions = { ...(prevExecData?.versions || {}) };
    if (!prevExecData?.versions && prevExecData?.cases) {
      existingVersions = { 'v1': { createdAt: prevExecData.createdAt || now, cases: prevExecData.cases } };
    }

    existingVersions[versionId] = {
      createdAt: existingVersions[versionId]?.createdAt || now,
      updatedAt: now,
      cases: newCasesMap,
    };

    return {
      schemaVersion: SCHEMA_VERSION,
      sourceFile:     sourceFile||'',
      sourceFileName: sourceFileName||'',
      createdAt: prevExecData?.createdAt || now,
      updatedAt: now,
      activeVersion: versionId,
      versions: existingVersions,
    };
  }

  function applyExecDataToCases(cases, execData, versionId) {
    const versionCases = getVersionCases(execData, versionId) || {};
    return cases.map(tc => {
      const { _isReset, _resetReason, _legacyExec, ...rest } = tc;
      const ec = versionCases[tc.id];
      if (!ec?.current) return { ...rest };
      const cur = ec.current;
      const execResults = rest.expectedResults.map(er => {
        const found = (cur.results||[]).find(r=>r.rowKey===er.key);
        return found ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'',Staging:'',Prod:'',...found.status } } : EMPTY_EXEC_ROW(er.key);
      });
      return {
        ...rest,
        exec: {
          notes: cur.notes||'',
          overallStatus: { DEV:'',Staging:'',Prod:'',...cur.overallStatus },
          results: execResults,
          updatedAt: cur.updatedAt||null,
        },
        history: ec.history||[],
      };
    });
  }

  // ─── SERIALIZER ───────────────────────────────────────────────────────────────
  function q(v) { const s=(v||'').replace(/"/g,'""'); return s.includes('\t')||s.includes('\n')||s.includes('"')?`"${s}"`:s; }
  function row(...cols) { return cols.map(q).join('\t'); }

  function serializeCardToTSV(cases) {
    const lines = [];
    const total = cases.length;
    const devCnt = s => cases.filter(c=>(c.exec?.overallStatus?.DEV||'').toLowerCase()===s.toLowerCase()).length;
    lines.push(row('total cases =','','',String(total),'','','','','','',''));
    lines.push(row('DEV','','','','STAGGING','','','PROD','','',''));
    lines.push(row('Passed','','',String(devCnt('Passed')),'Passed','','0','Passed','0','',''));
    lines.push(row('Failed','','',String(devCnt('Failed')),'Failed','','0','Failed','0','',''));
    lines.push(row('Need to test','','',String(devCnt('Need to Test')),'Need to test','','0','Need to test','0','',''));
    lines.push(row('On test','','',String(devCnt('On Test')),'On test','','0','On test','0','',''));
    lines.push(row('No Status','','','0','No Status','','0','No Status','0','',''));

    for (const tc of cases) {
      lines.push('');
      const steps = tc.steps.filter(s=>s.trim());
      const oSt = tc.exec?.overallStatus || { DEV:'',Staging:'',Prod:'' };
      const note = tc.exec?.notes||'';
      lines.push(row('Test ID',tc.id,'','','',note?'Note:':'',note,'',oSt.DEV,oSt.Staging,oSt.Prod));
      lines.push(row('Create at','','',tc.createDate||'','','created by',tc.createdBy||'','Tester',tc.tester||'','',''));
      lines.push(row('Scenario','','',tc.scenario||'','','Pre-Condition',tc.precondition||'','DATE',tc.createDate||'','',''));
      lines.push(row('Url','','',tc.url||'','','Description',tc.description||'','ENV','DEV','Staging','Prod'));

      if (steps.length > 0) {
        lines.push(row('Steps','','1',steps[0],'','test type',tc.testType||'','','','',''));
        for (let i=1;i<steps.length;i++) lines.push(row('','',String(i+1),steps[i],'','','','','','',''));
      }

      const baseN = steps.length+1;
      lines.push(row('','',String(baseN),'','','Status Response','Expected Result','Actual Result','Status','','Status'));
      tc.expectedResults.forEach((er,i) => {
        const execR = tc.exec?.results?.[i];
        lines.push(row('','',String(baseN+1+i),'','','',er.expected,execR?.actual||'',execR?.status?.DEV||'',execR?.status?.Staging||'',execR?.status?.Prod||''));
      });
      lines.push(''); lines.push(''); lines.push('');
    }
    return lines.join('\n');
  }

  // ─── EXEC FILE I/O ────────────────────────────────────────────────────────────
  function resolveExecPathParts(tsvRelPath) {
    const parts = tsvRelPath.split('/');
    const filename = parts[parts.length-1].replace(/\.tsv$/i,'.execution.json');
    const dirParts = parts[0]==='versions'
      ? ['.tcdata', ...parts.slice(1,-1)]
      : ['.tcdata', ...parts.slice(0,-1).filter(Boolean)];
    return [...dirParts, filename];
  }

  async function getNestedHandle(rootHandle, pathParts, create=false) {
    let cur = rootHandle;
    for (const part of pathParts.slice(0,-1)) {
      cur = await cur.getDirectoryHandle(part, { create });
    }
    return { dirHandle:cur, fileName:pathParts[pathParts.length-1] };
  }

  async function loadExecFile(rootHandle, tsvRelPath) {
    try {
      const pp = resolveExecPathParts(tsvRelPath);
      const { dirHandle, fileName } = await getNestedHandle(rootHandle, pp, false);
      const fh = await dirHandle.getFileHandle(fileName);
      return JSON.parse(await (await fh.getFile()).text());
    } catch { return null; }
  }

  async function saveExecFile(rootHandle, tsvRelPath, execData) {
    const pp = resolveExecPathParts(tsvRelPath);
    const { dirHandle, fileName } = await getNestedHandle(rootHandle, pp, true);
    const fh = await dirHandle.getFileHandle(fileName, { create:true });
    await writeFile(fh, JSON.stringify(execData, null, 2));
  }

  // ─── FILE SYSTEM + IDB ───────────────────────────────────────────────────────
  const SUPPORTED_EXT = /\.(tsv|csv|md|txt)$/i;

  async function scanDir(handle, base='') {
    const entries = [];
    for await (const [name, entry] of handle.entries()) {
      if (name.startsWith('.')) continue;
      const path = base ? `${base}/${name}` : name;
      if (entry.kind==='directory') {
        entries.push({ kind:'dir', name, path, handle:entry, children:await scanDir(entry,path) });
      } else if (SUPPORTED_EXT.test(name)) {
        entries.push({ kind:'file', name, path, handle:entry, ext:name.split('.').pop().toLowerCase() });
      }
    }
    return entries.sort((a,b) => { if(a.kind!==b.kind) return a.kind==='dir'?-1:1; return a.name.localeCompare(b.name); });
  }

  function openIDB() {
    return new Promise((res,rej) => {
      const r = indexedDB.open('tcbrowser',2);
      r.onupgradeneeded = e => { const db=e.target.result; if(!db.objectStoreNames.contains('handles')) db.createObjectStore('handles'); };
      r.onsuccess = e => res(e.target.result);
      r.onerror = e => rej(e.target.error);
    });
  }
  async function saveHandleIDB(h) { try { const db=await openIDB(); db.transaction('handles','readwrite').objectStore('handles').put(h,'root'); } catch(e){} }
  async function loadHandleIDB() {
    try { const db=await openIDB(); return new Promise(res=>{ const r=db.transaction('handles','readonly').objectStore('handles').get('root'); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
    catch { return null; }
  }
  async function saveLastFileIDB(val) { try { const db=await openIDB(); db.transaction('handles','readwrite').objectStore('handles').put(val,'lastFile'); } catch(e){} }
  async function loadLastFileIDB() {
    try { const db=await openIDB(); return new Promise(res=>{ const r=db.transaction('handles','readonly').objectStore('handles').get('lastFile'); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
    catch { return null; }
  }
  function findNodeByPath(nodes, targetPath) {
    for (const n of nodes) {
      if (n.kind==='file' && n.path===targetPath) return n;
      if (n.kind==='dir' && n.children) { const f=findNodeByPath(n.children,targetPath); if(f) return f; }
    }
    return null;
  }
  async function writeFile(fh, text) { const w=await fh.createWritable(); await w.write(text); await w.close(); }
  async function saveThemeIDB(tid) { try { const db=await openIDB(); db.transaction('handles','readwrite').objectStore('handles').put(tid,'theme'); } catch {} }
  async function loadThemeIDB() {
    try { const db=await openIDB(); return new Promise(res=>{ const r=db.transaction('handles','readonly').objectStore('handles').get('theme'); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
    catch { return null; }
  }

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function countFiles(node) {
    if (node.kind === 'file') return 1;
    if (!node.children) return 0;
    return node.children.reduce((s, c) => s + countFiles(c), 0);
  }

  // ─── HISTORY PANEL ────────────────────────────────────────────────────────────
  function diffAll(before, after) {
    const changes = [];
    if (!before || !after) return changes;
    const defMap = [
      ['Test Type','testType'],['Tester','tester'],['Date','createDate'],
      ['Scenario','scenario'],['Pre-Condition','precondition'],['Description','description'],['URL','url'],
    ];
    for (const [label, key] of defMap) {
      const bv = before[key]||'', av = after[key]||'';
      if (bv !== av) changes.push({ field:label, from:bv, to:av, type:'text' });
    }
    const bs = before.steps||[], as_s = after.steps||[];
    const maxS = Math.max(bs.length, as_s.length);
    for (let i=0; i<maxS; i++) {
      const bv = bs[i]||'', av = as_s[i]||'';
      if (bv !== av) changes.push({ field:`Step ${i+1}`, from:bv, to:av, type:'text' });
    }
    const be = before.expectedResults||[], ae = after.expectedResults||[];
    const maxE = Math.max(be.length, ae.length);
    for (let i=0; i<maxE; i++) {
      const bv = be[i]?.expected||'', av = ae[i]?.expected||'';
      const rk = be[i]?.key || ae[i]?.key || String(i+1);
      if (bv !== av) changes.push({ field:`Expected ${rk}`, from:bv, to:av, type:'text' });
    }
    for (const e of ENV) {
      const bv = before.overallStatus?.[e]||'', av = after.overallStatus?.[e]||'';
      if (bv !== av) changes.push({ field:`Overall ${e}`, from:bv, to:av, type:'status' });
    }
    const bn = before.notes||'', an = after.notes||'';
    if (bn !== an) changes.push({ field:'Notes', from:bn, to:an, type:'text' });
    const br = before.results||[], ar = after.results||[];
    const maxR = Math.max(br.length, ar.length);
    for (let i=0; i<maxR; i++) {
      const bRow = br[i]||{}, aRow = ar[i]||{};
      const rk = bRow.rowKey || aRow.rowKey || String(i+1);
      if ((bRow.actual||'') !== (aRow.actual||''))
        changes.push({ field:`Row ${rk} Actual`, from:bRow.actual||'', to:aRow.actual||'', type:'text' });
      for (const e of ENV) {
        const bst = bRow.status?.[e]||'', ast = aRow.status?.[e]||'';
        if (bst !== ast) changes.push({ field:`Row ${rk} ${e}`, from:bst, to:ast, type:'status' });
      }
    }
    return changes;
  }

  // ─── FILE NODE ────────────────────────────────────────────────────────────────
  function FileNode({ node, depth=0, selected, onSelect, sectionColor, onCreateFolder, activePath, forceOpen }) {
    const [open, setOpen]       = useState(depth < 2);
    const [showAdd, setShowAdd] = useState(false);
    const [hover, setHover]     = useState(false);
    const pl = 10 + depth * 16;

    // Auto-expand if the selected file is inside this folder
    useEffect(() => {
      if (node.kind === 'dir' && activePath && activePath.startsWith(node.path + '\\')) {
        setOpen(true);
      }
    }, [activePath]);

    if (node.kind === 'dir') {
      const fc = countFiles(node);
      const isOpen = forceOpen || open;
      return (
        <div>
          <div
            onMouseEnter={() => setHover(true)}
            onMouseLeave={() => setHover(false)}
            style={{
              display:'flex', alignItems:'center',
              padding:`4px 8px 4px ${pl}px`,
              cursor:'pointer', userSelect:'none',
              background: hover ? 'rgba(255,255,255,0.03)' : 'transparent',
              margin:'0 4px', borderRadius:4,
            }}
          >
            <span
              onClick={() => setOpen(o => !o)}
              style={{ color:'var(--text-4)', fontSize:10, width:14, flexShrink:0, display:'inline-block', textAlign:'center' }}
            >
              {isOpen ? '▾' : '▸'}
            </span>
            <span
              onClick={() => setOpen(o => !o)}
              title={node.name}
              style={{ fontSize:11, fontWeight:600, color: isOpen ? 'var(--text-2)' : 'var(--text-4)', flex:1, marginLeft:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
            >
              {node.name}
            </span>
            <button
              onClick={e => { e.stopPropagation(); setShowAdd(true); }}
              title="New subfolder"
              style={{ fontSize:13, lineHeight:1, background:'none', border:'none', color:'var(--text-4)', cursor:'pointer', padding:'0 3px', flexShrink:0, visibility: hover ? 'visible' : 'hidden' }}
            >
              +
            </button>
            <span style={{ fontSize:9, color:'var(--border-1)', flexShrink:0, marginLeft:2 }}>{fc}</span>
          </div>
          {showAdd && (
            <InlineFolderInput
              depth={depth + 1}
              onConfirm={name => { onCreateFolder(node.handle, name); setShowAdd(false); }}
              onCancel={() => setShowAdd(false)}
            />
          )}
          {isOpen && node.children.map(c => (
            <FileNode
              key={c.path} node={c} depth={depth + 1}
              selected={selected} onSelect={onSelect}
              sectionColor={sectionColor} onCreateFolder={onCreateFolder}
              activePath={activePath} forceOpen={forceOpen}
            />
          ))}
        </div>
      );
    }

    // File node
    const active = selected === node.path;
    const displayName = node.name.replace(/\.(tsv|csv|md|txt)$/i, '');
    const isData = node.ext === 'tsv' || node.ext === 'csv';

    return (
      <div
        onClick={() => onSelect(node)}
        onMouseEnter={() => setHover(true)}
        onMouseLeave={() => setHover(false)}
        style={{
          display:'flex', alignItems:'center',
          padding:`4px 8px 4px ${pl + 18}px`,
          cursor:'pointer', userSelect:'none',
          background: active ? 'rgba(255,255,255,0.08)' : hover ? 'rgba(255,255,255,0.03)' : 'transparent',
          borderLeft: active ? `2px solid ${sectionColor}` : '2px solid transparent',
          margin:'0',
        }}
      >
        <span style={{
          width:5, height:5, borderRadius:'50%', flexShrink:0, marginRight:8,
          background: active ? sectionColor : isData ? '#2d5a8e' : 'var(--text-5)',
        }}/>
        <span style={{
          fontSize: active ? 12 : 11,
          fontWeight: active ? 700 : 600,
          color: active ? 'var(--text-1)' : 'var(--text-3)',
          flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
        }}>
          {displayName}
        </span>
        <span style={{ fontSize:10, fontWeight:600, color: active ? 'var(--text-3)' : 'var(--text-4)', flexShrink:0, marginLeft:4 }}>.{node.ext}</span>
      </div>
    );
  }

  // ─── SIDEBAR SECTION ─────────────────────────────────────────────────────────
  function SidebarSection({ section, tree, sectionHandle, selected, onSelect, onCreateFolder, expanded, onToggle, forceOpen }) {
    const [showAdd, setShowAdd] = useState(false);
    const [hover, setHover]     = useState(false);
    const totalFiles = tree ? tree.reduce((s, n) => s + countFiles(n), 0) : 0;
    const isExpanded = forceOpen || expanded;

    return (
      <div>
        {/* Section header */}
        <div
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{ display:'flex', alignItems:'center', padding:'8px 10px 5px', userSelect:'none', cursor:'pointer' }}
          onClick={onToggle}
        >
          <span style={{ color:'var(--border-1)', fontSize:9, width:12, flexShrink:0, marginRight:5, display:'inline-block', textAlign:'center' }}>
            {isExpanded ? '▾' : '▸'}
          </span>
          <span style={{ fontSize:9, fontWeight:700, color: section.color, textTransform:'uppercase', letterSpacing:'0.1em', flex:1 }}>
            {section.label}
          </span>
          {!isExpanded && totalFiles > 0 && (
            <span style={{ fontSize:9, color:'var(--text-4)', marginRight:4 }}>{totalFiles}</span>
          )}
          {sectionHandle && (
            <button
              onClick={e => { e.stopPropagation(); setShowAdd(s => !s); }}
              title={`New folder in ${section.label}`}
              style={{ fontSize:14, lineHeight:1, background:'none', border:'none', color:'var(--text-4)', cursor:'pointer', padding:'0 3px', flexShrink:0, visibility: hover ? 'visible' : 'hidden' }}
            >
              +
            </button>
          )}
        </div>

        {isExpanded && (
          <div style={{ paddingBottom:4 }}>
            {showAdd && sectionHandle && (
              <InlineFolderInput
                depth={0}
                onConfirm={name => { onCreateFolder(section.id, sectionHandle, name); setShowAdd(false); }}
                onCancel={() => setShowAdd(false)}
              />
            )}
            {!tree && (
              <div style={{ padding:'2px 10px 8px 22px', fontSize:10, color:'var(--border-1)', fontStyle:'italic' }}>
                /{section.folderName} tidak ditemukan
              </div>
            )}
            {tree && tree.length === 0 && !showAdd && (
              <div style={{ padding:'2px 10px 8px 22px', fontSize:10, color:'var(--text-4)' }}>Kosong</div>
            )}
            {tree && tree.map(node => (
              <FileNode
                key={node.path} node={node} depth={0}
                selected={selected}
                onSelect={n => onSelect(n, section.id)}
                sectionColor={section.color}
                onCreateFolder={(parentHandle, name) => onCreateFolder(section.id, parentHandle, name)}
                activePath={selected}
                forceOpen={forceOpen}
              />
            ))}
          </div>
        )}

        <div style={{ height:1, background:'var(--deep-bg)', margin:'2px 8px 2px' }} />
      </div>
    );
  }

  // ─── CARD EDITOR ─────────────────────────────────────────────────────────────
  // ─── AUTOMAP ROW — extracted to avoid hooks-in-IIFE violation ───────────────
  function AutomapRow({ caseId, autoMap, onSaveMap, onRunCase }) {
    const am = autoMap[caseId] || {};
    const [localMap, setLocalMap] = useState({
      tc_type:      am.tc_type      || 'manual',
      spec_file:    am.spec_file    || '',
      grep_pattern: am.grep_pattern || '',
    });
    const [saved, setSaved] = useState(false);

    // Sync if parent autoMap changes (e.g. after initial load)
    useEffect(() => {
      const a = autoMap[caseId] || {};
      setLocalMap({ tc_type: a.tc_type || 'manual', spec_file: a.spec_file || '', grep_pattern: a.grep_pattern || '' });
    }, [autoMap, caseId]);

    function doSave() {
      onSaveMap && onSaveMap(caseId, localMap);
      setSaved(true); setTimeout(() => setSaved(false), 2000);
    }

    return (
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:9, color:'#0e7490', textTransform:'uppercase', letterSpacing:1, marginBottom:8,
          padding:'3px 9px', background:'#001a1e', borderRadius:4, display:'inline-block', border:'1px solid #155e75' }}>
          🤖 Automation Mapping
        </div>
        <div style={{ padding:'10px 12px', background:'var(--app-bg)', borderRadius:6,
          border:'1px solid var(--border-1)', display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'flex-end' }}>
            <div>
              <div style={{ fontSize:9, color:'var(--text-4)', marginBottom:4 }}>TYPE</div>
              <select value={localMap.tc_type} onChange={e=>setLocalMap(p=>({...p,tc_type:e.target.value}))}
                style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:'1px solid var(--border-1)',
                  background:'var(--elevated-bg)', color:'var(--text-1)', outline:'none', fontFamily:'inherit' }}>
                <option value="manual">manual</option>
                <option value="automation">automation</option>
                <option value="special">special</option>
              </select>
            </div>
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontSize:9, color:'var(--text-4)', marginBottom:4 }}>SPEC FILE</div>
              <input value={localMap.spec_file} onChange={e=>setLocalMap(p=>({...p,spec_file:e.target.value}))}
                placeholder="e.g. tests/conversation/chat.spec.ts"
                style={{ width:'100%', fontSize:11, padding:'4px 10px', borderRadius:6,
                  border:'1px solid var(--border-1)', background:'var(--elevated-bg)',
                  color:'var(--text-1)', outline:'none', fontFamily:'inherit' }}/>
            </div>
            <div style={{ flex:1, minWidth:150 }}>
              <div style={{ fontSize:9, color:'var(--text-4)', marginBottom:4 }}>GREP PATTERN (optional)</div>
              <input value={localMap.grep_pattern} onChange={e=>setLocalMap(p=>({...p,grep_pattern:e.target.value}))}
                placeholder="e.g. SIX-Convo-001"
                style={{ width:'100%', fontSize:11, padding:'4px 10px', borderRadius:6,
                  border:'1px solid var(--border-1)', background:'var(--elevated-bg)',
                  color:'var(--text-1)', outline:'none', fontFamily:'inherit' }}/>
            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <button onClick={doSave}
              style={{ fontSize:11, padding:'4px 14px', borderRadius:6, border:'none',
                background:'#0369a1', color:'#fff', cursor:'pointer' }}>
              {saved ? '✓ Saved' : 'Save Mapping'}
            </button>
            {localMap.spec_file && (
              <button onClick={()=>onRunCase && onRunCase(caseId, localMap.spec_file, localMap.grep_pattern)}
                style={{ fontSize:11, padding:'4px 14px', borderRadius:6,
                  border:'1px solid #065f46', background:'#022c22', color:'#4ade80', cursor:'pointer' }}>
                ▶ Run Test
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  function CardEditor({ cases:initCases, execData:initExecData, initialVersion, fileHandle, rootHandle, filePath, autoMap={}, onSaveMap, onRunCase }) {
    const [cases, setCases]               = useState(initCases);
    const [execData, setExecData]         = useState(initExecData);
    const [activeVersion, setActiveVersion] = useState(initialVersion || 'v1');
    const [addingVer, setAddingVer]       = useState(false);
    const [newVerName, setNewVerName]     = useState('');
    const [expanded, setExpanded]         = useState(null);
    const [search, setSearch]             = useState('');
    const [fStatus, setFStatus]           = useState('All');
    const [env, setEnv]                   = useState('DEV');
    const [dirty, setDirty]               = useState(false);
    const [saving, setSaving]             = useState(false);
    const [saveMsg, setSaveMsg]           = useState('');
    const [resetIdx, setResetIdx]         = useState(null);
    const [page, setPage]                 = useState(1);

    const stashRef = useRef({});
    const loadMoreRef = useRef(null);
    const mountedRef = useRef(false);  // guard: prevent on-mount useEffect re-renders

    // NOTE: useEffect([initCases]) reset removed — CardEditor is keyed by filePath,
    // so it always mounts fresh. Resetting state on mount via useEffect is redundant
    // and causes an extra render cascade (confirmed in perf trace).

    function allVersionNames() {
      const saved = execData?.versions
        ? Object.keys(execData.versions)
        : (execData?.cases ? ['v1'] : []);
      const unsaved = [...Object.keys(stashRef.current), activeVersion];
      const result = [...saved];
      for (const v of unsaved) { if (!result.includes(v)) result.push(v); }
      return result;
    }
    function suggestNextVer() {
      const vers = allVersionNames();
      const last = vers[vers.length - 1] || 'v1';
      const m = last.match(/^(.*?)(\d+)$/);
      return m ? m[1] + (parseInt(m[2]) + 1) : last + '-2';
    }
    function switchVersion(ver) {
      if (ver === activeVersion) return;
      stashRef.current[activeVersion] = cases;
      const stashed = stashRef.current[ver];
      if (stashed) {
        setCases(stashed);
      } else {
        setCases(mergeExecIntoCases(cases, execData, ver));
      }
      setActiveVersion(ver);
    }
    function openAddVer() { setNewVerName(suggestNextVer()); setAddingVer(true); }
    function confirmAddVer() {
      const name = newVerName.trim();
      if (!name) return;
      if (allVersionNames().includes(name)) { alert('Version sudah ada.'); return; }
      stashRef.current[activeVersion] = cases;
      const resetCases = cases.map(tc => ({
        ...tc,
        exec: EMPTY_EXEC(tc.expectedResults.length),
        history: [],
      }));
      setCases(resetCases);
      setActiveVersion(name);
      setAddingVer(false); setNewVerName('');
      setDirty(true);
    }

    function upd(i, fn) { setCases(p=>{ const n=[...p]; n[i]=fn({...n[i]}); return n; }); setDirty(true); }
    function updDef(i, f, v) { upd(i, tc=>({...tc,[f]:v})); }
    function updStep(i, si, v) { upd(i, tc=>{ const s=[...tc.steps]; s[si]=v; return {...tc,steps:s}; }); }
    function addStep(i) { upd(i, tc=>({...tc,steps:[...tc.steps,'']})); }
    function delStep(i, si) { upd(i, tc=>({...tc,steps:tc.steps.filter((_,j)=>j!==si)})); }
    function updExpected(i, ri, v) {
      upd(i, tc=>({ ...tc, expectedResults:tc.expectedResults.map((e,j)=>j!==ri?e:{...e,expected:v}) }));
    }
    function addExpected(i) {
      upd(i, tc=>{
        const rk = String(tc.expectedResults.length+1);
        return { ...tc,
          expectedResults:[...tc.expectedResults,{key:rk,expected:''}],
          exec:{...tc.exec, results:[...tc.exec.results, EMPTY_EXEC_ROW(rk)]},
        };
      });
    }
    function delExpected(i, ri) {
      upd(i, tc=>({
        ...tc,
        expectedResults: tc.expectedResults.filter((_,j)=>j!==ri),
        exec:{...tc.exec, results:tc.exec.results.filter((_,j)=>j!==ri)},
      }));
    }
    function updNotes(i, v) { upd(i, tc=>({...tc,exec:{...tc.exec,notes:v}})); }
    function updOverall(i, e, v) { upd(i, tc=>({...tc,exec:{...tc.exec,overallStatus:{...tc.exec.overallStatus,[e]:v}}})); }
    function updActual(i, ri, v) {
      upd(i, tc=>({...tc,exec:{...tc.exec,results:tc.exec.results.map((r,j)=>j!==ri?r:{...r,actual:v})}}));
    }
    function updResultStatus(i, ri, e, v) {
      upd(i, tc=>({...tc,exec:{...tc.exec,results:tc.exec.results.map((r,j)=>j!==ri?r:{...r,status:{...r.status,[e]:v}})}}));
    }

    function addCase() {
      const maxNum = cases.reduce((m,c)=>{ const x=c.id.match(/(\d+)$/); return x?Math.max(m,parseInt(x[1])):m; },0);
      const prefix = cases[0]?.id.replace(/-\d+$/,'')||'TC';
      const nc = { ...EMPTY_TC(), id:`${prefix}-${String(maxNum+1).padStart(3,'0')}` };
      setCases(p=>[...p,nc]); setDirty(true); setExpanded(cases.length);
    }
    function delCase(i) {
      if(!confirm('Hapus test case ini?')) return;
      setCases(p=>p.filter((_,j)=>j!==i)); setDirty(true); setExpanded(null);
    }

    function doReset(i, reason) {
      setResetIdx(null);
      upd(i, tc=>({
        ...tc,
        exec: {
          notes:'',
          overallStatus:{ DEV:'',Staging:'',Prod:'' },
          results: tc.expectedResults.map(er=>EMPTY_EXEC_ROW(er.key)),
          updatedAt: nowISO(),
        },
        _isReset: true,
        _resetReason: reason||'',
      }));
    }

    async function save() {
      setSaving(true);
      try {
        // Save TSV via API (filePath) or legacy fileHandle
        const tsvContent = serializeCardToTSV(cases);
        if (filePath) {
          const r = await fetch('/api/files/content?path=' + encodeURIComponent(filePath), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: tsvContent }),
          });
          if (!r.ok) throw new Error(await r.text());
        } else if (fileHandle) {
          await writeFile(fileHandle, tsvContent);
        }
        // Save exec JSON
        if (filePath) {
          const srcName = filePath.split('/').pop();
          const newExec = buildExecJSON(cases, execData, filePath, srcName, activeVersion);
          const execPath = filePath.replace(/\.tsv$/i, '.exec.json').replace(/\.csv$/i, '.exec.json');
          const r2 = await fetch('/api/files/content?path=' + encodeURIComponent(execPath), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: JSON.stringify(newExec, null, 2) }),
          });
          if (!r2.ok) throw new Error(await r2.text());
          setCases(applyExecDataToCases(cases, newExec, activeVersion));
          setExecData(newExec);
        } else {
          setCases(p=>p.map(tc=>{ const {_isReset,_resetReason,_legacyExec,...r}=tc; return r; }));
        }
        setDirty(false);
        setSaveMsg('Saved ✓'); setTimeout(()=>setSaveMsg(''),2500);
      } catch(e) { setSaveMsg('Error: '+e.message); }
      setSaving(false);
    }

    function copyTSV() {
      navigator.clipboard.writeText(serializeCardToTSV(cases));
      setSaveMsg('Copied!'); setTimeout(()=>setSaveMsg(''),2000);
    }

    const counts = STATUS_OPTIONS.filter(Boolean).reduce((acc,s)=>({
      ...acc,[s]:cases.filter(c=>(c.exec?.overallStatus?.[env]||'')===s).length,
    }),{});

    const filtered = cases.filter(c => {
      if (search) { const q=search.toLowerCase(); if(!c.id.toLowerCase().includes(q)&&!c.scenario.toLowerCase().includes(q)) return false; }
      if (fStatus!=='All' && (c.exec?.overallStatus?.[env]||'')!==fStatus) return false;
      return true;
    });

    // Reset page on filter/search/env change — skip on mount (page starts at 1 already)
    useEffect(() => {
      if (!mountedRef.current) { mountedRef.current = true; return; }
      setPage(1);
    }, [search, fStatus, env]);

    // Infinite scroll via IntersectionObserver
    // Guard: skip the very first observation to prevent immediate fire on mount
    const obsReadyRef = useRef(false);
    useEffect(() => {
      const el = loadMoreRef.current;
      if (!el) return;
      obsReadyRef.current = false;  // reset on each dep change
      const obs = new IntersectionObserver(entries => {
        if (!obsReadyRef.current) { obsReadyRef.current = true; return; } // skip first callback
        if (entries[0].isIntersecting && page * 30 < filtered.length) {
          setPage(p => p + 1);
        }
      }, { threshold: 0.1 });
      obs.observe(el);
      return () => obs.disconnect();
    }, [page, filtered.length]);

    const PAGE_SIZE = 30;
    const visible = filtered.slice(0, page * PAGE_SIZE);
    const hasMore = visible.length < filtered.length;

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>

        {resetIdx!==null && (
          <ResetModal
            onConfirm={reason=>doReset(resetIdx,reason)}
            onCancel={()=>setResetIdx(null)}
          />
        )}

        {/* Toolbar */}
        <div style={{ padding:'8px 14px', borderBottom:'1px solid var(--border-1)', background:'var(--sidebar-bg)', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap', flexShrink:0 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ID / scenario..."
            style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:'1px solid var(--border-1)', background:'var(--elevated-bg)', color:'var(--text-1)', outline:'none', width:200 }} />
          <div style={{ display:'flex', gap:3 }}>
            {['All','Passed','Failed','Need to Test','On Test'].map(s=>(
              <button key={s} onClick={()=>setFStatus(s===fStatus?'All':s)}
                style={{ fontSize:10, padding:'3px 9px', borderRadius:12, border:'1px solid', cursor:'pointer',
                  background:fStatus===s?'#3b82f6':'transparent', borderColor:fStatus===s?'#3b82f6':'var(--border-1)', color:fStatus===s?'#fff':'var(--text-3)' }}>
                {s}{s!=='All'?` ${counts[s]||0}`:` ${cases.length}`}
              </button>
            ))}
          </div>
          <div style={{ display:'flex', gap:3 }}>
            {ENV.map(e=>(
              <button key={e} onClick={()=>setEnv(e)}
                style={{ fontSize:10, padding:'3px 9px', borderRadius:12, border:'1px solid', cursor:'pointer',
                  background:env===e?'#7c3aed':'transparent', borderColor:env===e?'#7c3aed':'var(--border-1)', color:env===e?'#fff':'var(--text-3)' }}>
                {e}
              </button>
            ))}
          </div>

          {/* Version picker */}
          <div style={{ display:'flex', gap:5, alignItems:'center', borderLeft:'1px solid var(--border-1)', paddingLeft:8 }}>
            <span style={{ fontSize:9, color:'var(--text-4)', textTransform:'uppercase', letterSpacing:1 }}>VER</span>
            <select
              value={activeVersion}
              onChange={e=>switchVersion(e.target.value)}
              style={{ fontSize:11, padding:'3px 8px', borderRadius:6, border:'1px solid #0d9488', background:'var(--elevated-bg)', color:'#2dd4bf', outline:'none', cursor:'pointer', fontFamily:'inherit' }}>
              {allVersionNames().map(ver=>(
                <option key={ver} value={ver}>{ver}{stashRef.current[ver] ? ' *' : ''}</option>
              ))}
            </select>
            {addingVer ? (
              <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                <input
                  value={newVerName}
                  onChange={e=>setNewVerName(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') confirmAddVer(); if(e.key==='Escape') setAddingVer(false); }}
                  autoFocus
                  placeholder="nama version..."
                  style={{ fontSize:10, padding:'3px 8px', borderRadius:6, border:'1px solid #0d9488', background:'var(--elevated-bg)', color:'var(--text-1)', outline:'none', width:100, fontFamily:'inherit' }}
                />
                <button onClick={confirmAddVer} style={{ fontSize:12, background:'none', border:'none', color:'#4ade80', cursor:'pointer', padding:0 }}>✓</button>
                <button onClick={()=>setAddingVer(false)} style={{ fontSize:12, background:'none', border:'none', color:'#f87171', cursor:'pointer', padding:0 }}>✕</button>
              </div>
            ) : (
              <button onClick={openAddVer}
                style={{ fontSize:11, padding:'2px 9px', borderRadius:6, border:'1px solid var(--border-1)', background:'transparent', color:'var(--text-4)', cursor:'pointer' }}>
                + New
              </button>
            )}
          </div>

          <span style={{ fontSize:10, color:'var(--text-4)' }}>{filtered.length}/{cases.length}</span>
          <div style={{ marginLeft:'auto', display:'flex', gap:6, alignItems:'center' }}>
            {saveMsg && <span style={{ fontSize:11, color:saveMsg.startsWith('Error')?'#f87171':'#4ade80' }}>{saveMsg}</span>}
            <Btn onClick={copyTSV} color='var(--text-5)'>📋 Copy TSV</Btn>
            {fileHandle && (
              <Btn onClick={save} bg={dirty?'#3b82f6':'var(--border-1)'} color={dirty?'#3b82f6':'var(--text-5)'}>
                {saving?'Saving…':dirty?'💾 Save':'✓ Saved'}
              </Btn>
            )}
            <Btn onClick={addCase} bg='#059669' color='#059669'>+ Add Case</Btn>
          </div>
        </div>

        {/* Stats bar */}
        <div style={{ display:'flex', borderBottom:'1px solid var(--elevated-bg)', flexShrink:0 }}>
          {[['Passed','#4ade80'],['Failed','#f87171'],['On Test','#60a5fa'],['Need to Test','#fbbf24']].map(([k,c])=>(
            <div key={k} style={{ flex:1, padding:'7px 4px', textAlign:'center' }}>
              <div style={{ fontSize:16, fontWeight:700, color:c }}>{counts[k]||0}</div>
              <div style={{ fontSize:9, color:'var(--text-3)' }}>{k}</div>
            </div>
          ))}
          <div style={{ flex:1, padding:'7px 4px', textAlign:'center' }}>
            <div style={{ fontSize:16, fontWeight:700, color:'var(--text-1)' }}>{cases.length}</div>
            <div style={{ fontSize:9, color:'var(--text-3)' }}>Total</div>
          </div>
        </div>

        {/* Table header */}
        <div style={{ display:'grid', gridTemplateColumns:'110px 1fr 70px 150px 120px 46px', padding:'5px 14px', fontSize:10, color:'var(--text-3)', textTransform:'uppercase', letterSpacing:1, borderBottom:'1px solid var(--border-1)', background:'var(--deep-bg)', flexShrink:0 }}>
          <div>Test ID</div><div>Scenario</div><div>Type</div><div>Status ({env})</div><div>Updated</div><div></div>
        </div>

        {/* Rows */}
        <div style={{ flex:1, overflowY:'auto' }}>
          {visible.map(tc => {
            const gi = cases.indexOf(tc);
            const isOpen = expanded===gi;
            const oSt = tc.exec?.overallStatus?.[env]||'';
            return (
              <div key={gi} style={{ borderBottom:'1px solid var(--deep-bg)' }}>
                <div onClick={()=>setExpanded(isOpen?null:gi)}
                  style={{ display:'grid', gridTemplateColumns:'110px 1fr 70px 150px 120px 46px', padding:'7px 14px', alignItems:'center', cursor:'pointer',
                    background:isOpen?'#0d1b30':'transparent', borderLeft:isOpen?'2px solid #3b82f6':'2px solid transparent' }}>

  function MarkdownViewer({ content, fileHandle, filePath }) {
    const [editMode, setEditMode] = useState(false);
    const [draft, setDraft]       = useState(content);
    const [saving, setSaving]     = useState(false);
    const [saveErr, setSaveErr]   = useState(null);
    const [copied, setCopied]     = useState(false);
    const mdRef                   = useRef(null);

    function handleCopy() {
      if (!mdRef.current) return;
      const html = mdRef.current.innerHTML;
      try {
        const item = new ClipboardItem({
          'text/html':  new Blob([html],  { type: 'text/html' }),
          'text/plain': new Blob([draft], { type: 'text/plain' }),
        });
        navigator.clipboard.write([item]).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {
          // fallback: plain text
          navigator.clipboard.writeText(draft).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          });
        });
      } catch {
        navigator.clipboard.writeText(draft).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }
    }

    // Set innerHTML from draft — on mount and after save.
    // We never touch innerHTML while the user is editing (editMode=true),
    // so React never clobbers in-progress edits.
    useLayoutEffect(() => {
      if (mdRef.current) mdRef.current.innerHTML = marked.parse(draft);
    }, [draft]);

    async function handleSave() {
      if (!mdRef.current) return;
      setSaving(true); setSaveErr(null);
      try {
        const td = new TurndownService({ headingStyle: 'atx', hr: '---', codeBlockStyle: 'fenced' });
        td.use(turndownPluginGfm.gfm);
        const markdown = td.turndown(mdRef.current.innerHTML);
        if (filePath) {
          // API-based save (server mode)
          const r = await fetch('/api/files/content?path=' + encodeURIComponent(filePath), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: markdown }),
          });
          if (!r.ok) throw new Error(await r.text());
        } else if (fileHandle) {
          // Legacy File System Access API fallback
          const w = await fileHandle.createWritable();
          await w.write(markdown);
          await w.close();
        } else {
          throw new Error('No save target — filePath or fileHandle required');
        }
        setDraft(markdown);
        setEditMode(false);
      } catch(e) {
        setSaveErr(e.message || 'Save failed');
      }
      setSaving(false);
    }

    function handleCancel() {
      if (mdRef.current) mdRef.current.innerHTML = marked.parse(draft); // discard edits
      setEditMode(false);
      setSaveErr(null);
    }

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
        {/* Toolbar */}
        <div style={{ padding:'5px 14px', borderBottom:'1px solid var(--elevated-bg)', background:'var(--sidebar-bg)',
          display:'flex', alignItems:'center', justifyContent:'flex-end', gap:6, flexShrink:0 }}>
          {saveErr && <span style={{ fontSize:10, color:'#f87171', flex:1 }}>⚠ {saveErr}</span>}
          <button onClick={handleCopy}
            style={{ fontSize:10, color: copied ? '#22c55e' : 'var(--text-3)', background:'transparent',
              border:'1px solid var(--border-1)', borderRadius:4, padding:'3px 10px', cursor:'pointer',
              transition:'color 0.2s' }}>
            {copied ? '✓ Copied!' : '⎘ Copy'}
          </button>
          {editMode ? (
            <>
              <span style={{ fontSize:10, color:'var(--text-4)', flex:1 }}>✎ editing</span>
              <button onClick={handleCancel}
                style={{ fontSize:10, color:'var(--text-3)', background:'transparent', border:'1px solid var(--border-1)',
                  borderRadius:4, padding:'3px 10px', cursor:'pointer' }}>
                Cancel
              </button>
              <button onClick={handleSave} disabled={saving}
                style={{ fontSize:10, color:'#fff', background: saving ? 'var(--text-5)' : '#3b82f6',
                  border:'none', borderRadius:4, padding:'3px 10px', cursor: saving ? 'default' : 'pointer' }}>
                {saving ? 'Saving…' : '✓ Save'}
              </button>
            </>
          ) : (
            <button onClick={() => setEditMode(true)}
              style={{ fontSize:10, color:'var(--text-3)', background:'transparent', border:'1px solid var(--border-1)',
                borderRadius:4, padding:'3px 10px', cursor:'pointer' }}>
              ✎ Edit
            </button>
          )}
        </div>

        {/* Body — single persistent div, never unmounted → scroll position never resets */}
        <div style={{ overflowY:'auto', flex:1, display:'flex', justifyContent:'center' }}>
          <div
            ref={mdRef}
            className="md"
            contentEditable={editMode}
            suppressContentEditableWarning={true}
            spellCheck={false}
            style={{ padding:'32px 40px', width:'100%', maxWidth:860,
              outline:'none',
              cursor: editMode ? 'text' : 'default',
              borderLeft: editMode ? '2px solid var(--sec-prd)' : '2px solid transparent',
            }}
          />
        </div>
      </div>
    );
  }

  // ─── RUN PANEL ────────────────────────────────────────────────────────────────
  function RunPanel({ caseId, specFile, grepPattern, onClose }) {
    const [lines, setLines]   = useState([]);
    const [status, setStatus] = useState('running'); // running | pass | fail | error
    const [elapsed, setElapsed] = useState(0);
    const abortRef = useRef(null);
    const bodyRef  = useRef(null);
    const timerRef = useRef(null);

    useEffect(() => {
      const ctrl = new AbortController();
      abortRef.current = ctrl;
      const t0 = Date.now();
      timerRef.current = setInterval(() => setElapsed(Math.floor((Date.now()-t0)/1000)), 500);

      fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ case_id: caseId, spec_file: specFile, grep_pattern: grepPattern }),
        signal: ctrl.signal,
      }).then(async res => {
        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        let   buf    = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const parts = buf.split('\n\n');
          buf = parts.pop();
          for (const part of parts) {
            const dataLine = part.split('\n').find(l => l.startsWith('data:'));
            if (!dataLine) continue;
            try {
              const evt = JSON.parse(dataLine.slice(5));
              if (evt.type === 'output') {
                setLines(prev => [...prev, ...evt.text.split('\n').filter(Boolean)]);
                setTimeout(() => bodyRef.current?.scrollTo(0, bodyRef.current.scrollHeight), 30);
              } else if (evt.type === 'run_end') {
                setStatus(evt.status);
                clearInterval(timerRef.current);
                setElapsed(Math.round(evt.duration_ms / 1000));
              }
            } catch {}
          }
        }
      }).catch(e => {
        if (e.name !== 'AbortError') { setStatus('error'); clearInterval(timerRef.current); }
      });

      return () => {
        ctrl.abort();
        clearInterval(timerRef.current);
      };
    }, []);

    const statusColor = { running:'#60a5fa', pass:'#4ade80', fail:'#f87171', error:'#fbbf24' }[status] || '#888';

    return (
      <div style={{ position:'fixed', bottom:0, right:0, width:600, height:380, zIndex:200,
        background:'var(--sidebar-bg)', border:'1px solid var(--border-1)',
        borderBottom:'none', borderRight:'none', borderRadius:'8px 0 0 0',
        display:'flex', flexDirection:'column', fontFamily:'inherit' }}>
        {/* Header */}
        <div style={{ padding:'7px 12px', borderBottom:'1px solid var(--border-1)',
          display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
          <span style={{ fontSize:10, color:statusColor, fontWeight:700 }}>
            {status === 'running' ? '● Running…' : status === 'pass' ? '✓ Passed' : status === 'fail' ? '✗ Failed' : '⚠ Error'}
          </span>
          <span style={{ fontSize:10, color:'var(--text-4)', flex:1 }}>{caseId} · {specFile}{grepPattern ? ` --grep "${grepPattern}"` : ''}</span>
          <span style={{ fontSize:10, color:'var(--text-5)' }}>{elapsed}s</span>
          {status === 'running' && (
            <button onClick={() => abortRef.current?.abort()}
              style={{ fontSize:10, padding:'2px 8px', borderRadius:4, border:'1px solid #7f1d1d', background:'#1c0a0a', color:'#f87171', cursor:'pointer' }}>
              ■ Stop
            </button>
          )}
          <button onClick={onClose}
            style={{ fontSize:12, background:'none', border:'none', color:'var(--text-4)', cursor:'pointer', padding:'0 2px' }}>✕</button>
        </div>
        {/* Output */}
        <div ref={bodyRef} style={{ flex:1, overflowY:'auto', padding:'8px 12px', fontSize:11, lineHeight:1.6, color:'var(--text-2)' }}>
          {lines.map((l, i) => {
            const col = /\bPASS\b|✓|passed/i.test(l) ? '#4ade80'
                      : /\bFAIL\b|✗|failed|error/i.test(l) ? '#f87171'
                      : /^\s+\d+ (passed|failed)/i.test(l) ? '#fbbf24'
                      : 'var(--text-2)';
            return <div key={i} style={{ color: col, whiteSpace:'pre-wrap', wordBreak:'break-all' }}>{l}</div>;
          })}
          {lines.length === 0 && status === 'running' && (
            <div style={{ color:'var(--text-5)', fontStyle:'italic' }}>Starting Playwright…</div>
          )}
        </div>
      </div>
    );
  }

    const [sections, setSections]     = useState([]);

    const [fileData, setFileData]     = useState(null);
    const [loading, setLoading]       = useState(false);
    const [error, setError]           = useState(null);
    const [sideSearch, setSideSearch] = useState('');
    const [sidebarWidth, setSidebarWidth] = useState(256);
    const [activeSection, setActiveSection] = useState(null);
    const [autoMap, setAutoMap]       = useState({});
    const [runCase, setRunCase]       = useState(null); // { caseId, specFile, grepPattern }
    const [importing, setImporting]   = useState(false);
    const [importMsg, setImportMsg]   = useState('');
    const themeRef  = useRef(null);
    const isDraggingRef = useRef(false);
    const dragStartXRef = useRef(0);
    const dragStartWRef = useRef(0);

    // ── Sidebar resize ──────────────────────────────────────────────────────────
    function onResizeStart(e) {
      isDraggingRef.current = true;
      dragStartXRef.current = e.clientX;
      dragStartWRef.current = sidebarWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const onMove = ev => {
        if (!isDraggingRef.current) return;
        const next = Math.min(480, Math.max(160, dragStartWRef.current + ev.clientX - dragStartXRef.current));
        setSidebarWidth(next);
      };
      const onUp = () => {
        isDraggingRef.current = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

    // ── Theme ───────────────────────────────────────────────────────────────────
    function switchTheme(id) {
      const t = THEMES.find(x => x.id === id);
      if (!t) return;
      applyThemeVars(t);
      saveThemeIDB(id);
      requestAnimationFrame(() => requestAnimationFrame(() => themeRef.current?.setTheme(id)));
    }

    // ── Load file tree from API ──────────────────────────────────────────────────
    async function loadTree() {
      try {
        const res = await fetch('/api/files');
        const data = await res.json();
        setSections(data);
        // expand first section that has content
        const first = data.find(s => s.tree?.length > 0);
        if (first && !activeSection) setActiveSection(first.id);
      } catch(e) { setError('Cannot reach server: ' + e.message); }
    }

    // ── Load automation map for a file's test cases ──────────────────────────────
    async function loadAutoMap(cases) {
      if (!cases?.length) return;
      const ids = cases.map(c => c.id).filter(Boolean);
      if (!ids.length) return;
      try {
        const rows = await fetch('/api/testcases?' + new URLSearchParams({ limit: 500 }))
          .then(r => r.json());
        const map = {};
        for (const row of rows) {
          if (row.tc_type || row.spec_file) {
            map[row.id] = { tc_type: row.tc_type || 'manual', spec_file: row.spec_file || '', grep_pattern: row.grep_pattern || '' };
          }
        }
        setAutoMap(map);
      } catch {}
    }

    // ── Open a file ─────────────────────────────────────────────────────────────
    async function openFile(node, sectionId) {
      if (node.kind !== 'file') return;
      setSelected({ path: node.path, sectionId, name: node.name, ext: node.ext });
      setActiveSection(sectionId);
      setLoading(true);
      setFileData(null);
      setError(null);
      try {
        const text = await fetch('/api/files/content?path=' + encodeURIComponent(node.path)).then(r => r.text());
        const ne = text.split('\n');
        if (node.ext === 'md') {
          setFileData({ type: 'md', content: text, path: node.path });
        } else {
          // Try card format
          function isCardFmt(lines) {
            const first10 = lines.slice(0, 10).join('\t');
            return /Test ID/i.test(first10) || /Scenario/i.test(first10);
          }
          if (isCardFmt(ne)) {
            const cases = parseCardFormat(ne);
            // try to get exec data from companion JSON
            const execPath = node.path.replace(/\.tsv$/i, '.exec.json').replace(/\.csv$/i, '.exec.json');
            let execData = null;
            try {
              const ejson = await fetch('/api/files/content?path=' + encodeURIComponent(execPath)).then(r => r.ok ? r.json() : null);
              execData = ejson;
            } catch {}
            setFileData({ type: 'card', cases, execData, path: node.path });
            await loadAutoMap(cases);
          } else {
            setFileData({ type: 'text', content: text, path: node.path });
          }
        }
      } catch(e) { setError(e.message); }
      setLoading(false);
    }

    // ── Save exec JSON via API ───────────────────────────────────────────────────
    async function saveExecViaAPI(tsvPath, execData) {
      const execPath = tsvPath.replace(/\.tsv$/i, '.exec.json').replace(/\.csv$/i, '.exec.json');
      await fetch('/api/files/content?path=' + encodeURIComponent(execPath), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: JSON.stringify(execData, null, 2) }),
      });
    }

    // ── Save automation mapping ──────────────────────────────────────────────────
    async function handleSaveMap(caseId, mapData) {
      try {
        await fetch(`/api/testcases/${caseId}/map`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(mapData),
        });
        setAutoMap(prev => ({ ...prev, [caseId]: { tc_type: mapData.tc_type || 'manual', spec_file: mapData.spec_file || '', grep_pattern: mapData.grep_pattern || '' } }));
      } catch(e) { alert('Save mapping failed: ' + e.message); }
    }

    // ── Import TSV/MD files into DB ──────────────────────────────────────────────
    async function handleImport() {
      setImporting(true); setImportMsg('');
      try {
        const r = await fetch('/api/import', { method: 'POST' }).then(r => r.json());
        setImportMsg(`✓ Imported ${r.test_cases} test cases, ${r.prd_files} PRD files`);
        setTimeout(() => setImportMsg(''), 4000);
        // Reload automap if a card file is open
        if (fileData?.cases) loadAutoMap(fileData.cases);
      } catch(e) { setImportMsg('⚠ ' + e.message); }
      setImporting(false);
    }

    // ── Restore theme on mount + load tree ───────────────────────────────────────
    useEffect(() => {
      (async () => {
        const tid = await loadThemeIDB();
        if (tid) {
          const t = THEMES.find(x => x.id === tid);
          if (t) { applyThemeVars(t); themeRef.current?.setTheme(tid); }
        }
      })();
      loadTree();
    }, []);

    // Sync activeSection when selected changes
    useEffect(() => {
      if (selected?.sectionId) setActiveSection(selected.sectionId);
    }, [selected?.sectionId]);

    // ── Render sidebar tree nodes ────────────────────────────────────────────────
    function renderTree(nodes, sectionId, depth = 0) {
      if (!nodes) return null;
      const filtered = sideSearch
        ? nodes.filter(n => n.name.toLowerCase().includes(sideSearch.toLowerCase()) || n.kind === 'dir')
        : nodes;
      return filtered.map(node => {
        const isSelected = selected?.path === node.path;
        const pad = 12 + depth * 14;
        if (node.kind === 'dir') {
          const sub = renderTree(node.children, sectionId, depth + 1);
          if (sideSearch && !sub?.length) return null;
          return (
            <div key={node.path}>
              <div style={{ padding:`4px 8px 4px ${pad}px`, fontSize:10, color:'var(--text-4)',
                fontWeight:600, textTransform:'uppercase', letterSpacing:0.5,
                display:'flex', alignItems:'center', gap:5, cursor:'default' }}>
                <span style={{ opacity:0.5 }}>📁</span>{node.name}
              </div>
              {sub}
            </div>
          );
        }
        const extColor = node.ext === 'md' ? 'var(--sec-prd)' : node.ext === 'tsv' ? 'var(--sec-test)' : 'var(--text-4)';
        return (
          <div key={node.path} onClick={() => openFile(node, sectionId)}
            style={{ padding:`5px 8px 5px ${pad}px`, cursor:'pointer', display:'flex', alignItems:'center', gap:6,
              background: isSelected ? 'rgba(255,255,255,0.06)' : 'transparent',
              borderLeft: isSelected ? `2px solid ${extColor}` : '2px solid transparent',
              fontSize:11, color: isSelected ? 'var(--text-1)' : 'var(--text-3)' }}>
            <span style={{ fontSize:9, color: extColor, flexShrink:0 }}>{node.ext?.toUpperCase()}</span>
            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{node.name}</span>
          </div>
        );
      });
    }

    // ── Main content area ────────────────────────────────────────────────────────
    function renderContent() {
      if (!selected) return (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center',
          flexDirection:'column', gap:12, color:'var(--text-5)' }}>
          <div style={{ fontSize:28, opacity:0.3 }}>◈</div>
          <div style={{ fontSize:12 }}>Select a file from the sidebar</div>
          <div style={{ fontSize:11, opacity:0.6 }}>Supported: TSV test cases, Markdown PRD/BRD</div>
        </div>
      );

      if (loading) return (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-5)' }}>
          <div style={{ fontSize:12 }}>Loading…</div>
        </div>
      );

      if (error) return (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ fontSize:12, color:'#f87171', maxWidth:400, textAlign:'center' }}>⚠ {error}</div>
        </div>
      );

      if (!fileData) return null;

      if (fileData.type === 'card') {
        return (
          <CardEditor
            key={fileData.path}
            cases={fileData.cases}
            execData={fileData.execData}
            filePath={fileData.path}
            fileHandle={null}
            rootHandle={null}
            autoMap={autoMap}
            onSaveMap={handleSaveMap}
            onRunCase={(caseId, specFile, grepPattern) => setRunCase({ caseId, specFile, grepPattern })}
          />
        );
      }

      if (fileData.type === 'md') {
        return (
          <MarkdownViewer
            key={fileData.path}
            content={fileData.content}
            filePath={fileData.path}
            fileHandle={null}
          />
        );
      }

      return (
        <div style={{ flex:1, overflowY:'auto', padding:'24px 32px' }}>
          <pre style={{ fontSize:12, color:'var(--text-3)', lineHeight:1.6, whiteSpace:'pre-wrap', wordBreak:'break-all' }}>{fileData.content}</pre>
        </div>
      );
    }

    return (
      <div style={{ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* ── Top bar ────────────────────────────────────────────────── */}
        <div style={{ height:38, flexShrink:0, background:'var(--sidebar-bg)',
          borderBottom:'1px solid var(--border-1)', display:'flex', alignItems:'center',
          paddingLeft:14, paddingRight:10, gap:10, zIndex:10 }}>
          <span style={{ fontSize:13, color:'var(--text-2)', fontWeight:700, letterSpacing:0.5 }}>◈ QA Browser</span>
          <span style={{ fontSize:9, color:'var(--text-5)', marginTop:1 }}>SatuInbox</span>
          <div style={{ flex:1 }} />
          {importMsg && <span style={{ fontSize:10, color: importMsg.startsWith('⚠') ? '#f87171' : '#4ade80' }}>{importMsg}</span>}
          <button onClick={handleImport} disabled={importing}
            style={{ fontSize:10, padding:'3px 10px', borderRadius:4, border:'1px solid var(--border-1)',
              background:'var(--elevated-bg)', color:'var(--text-3)', cursor: importing ? 'default' : 'pointer' }}>
            {importing ? 'Importing…' : '⟳ Import TSV/MD'}
          </button>
          <ThemeSwitcher ref={themeRef} onSwitch={switchTheme} />
        </div>

        {/* ── Body (sidebar + content) ────────────────────────────────── */}
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>

          {/* Sidebar */}
          <div style={{ width: sidebarWidth, flexShrink:0, display:'flex', flexDirection:'column',
            background:'var(--sidebar-bg)', borderRight:'1px solid var(--border-1)', overflow:'hidden' }}>
            {/* Search */}
            <div style={{ padding:'6px 8px', borderBottom:'1px solid var(--border-1)', flexShrink:0 }}>
              <input value={sideSearch} onChange={e=>setSideSearch(e.target.value)}
                placeholder="filter files…"
                style={{ width:'100%', background:'var(--elevated-bg)', border:'1px solid var(--border-1)',
                  borderRadius:4, padding:'4px 8px', fontSize:11, color:'var(--text-2)',
                  outline:'none', fontFamily:'inherit' }}/>
            </div>

            {/* File tree */}
            <div style={{ flex:1, overflowY:'auto' }}>
              {sections.length === 0 && (
                <div style={{ padding:20, fontSize:11, color:'var(--text-5)', textAlign:'center' }}>
                  {error ? error : 'Loading files…'}
                </div>
              )}
              {sections.map(sec => {
                const isActive = activeSection === sec.id;
                const hasFiles = sec.tree?.length > 0;
                return (
                  <div key={sec.id}>
                    <div onClick={() => setActiveSection(isActive ? null : sec.id)}
                      style={{ padding:'6px 10px', display:'flex', alignItems:'center', gap:6,
                        cursor:'pointer', borderBottom:'1px solid var(--border-2)',
                        background: isActive ? 'rgba(255,255,255,0.03)' : 'transparent' }}>
                      <span style={{ width:3, height:3, borderRadius:'50%', background: sec.color, flexShrink:0 }}/>
                      <span style={{ flex:1, fontSize:10, fontWeight:600, color: sec.color, textTransform:'uppercase', letterSpacing:0.5 }}>{sec.label}</span>
                      <span style={{ fontSize:9, color:'var(--text-5)' }}>{isActive ? '▾' : '▸'}</span>
                    </div>
                    {isActive && hasFiles && (
                      <div style={{ paddingBottom:4 }}>
                        {renderTree(sec.tree, sec.id)}
                      </div>
                    )}
                    {isActive && !hasFiles && (
                      <div style={{ padding:'8px 14px', fontSize:10, color:'var(--text-5)' }}>No files</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Resize handle */}
          <div onMouseDown={onResizeStart}
            style={{ width:4, cursor:'col-resize', flexShrink:0, background:'transparent',
              borderRight:'1px solid var(--border-1)' }}
            onMouseEnter={e=>e.target.style.background='var(--border-1)'}
            onMouseLeave={e=>e.target.style.background='transparent'} />

          {/* Content area */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:'var(--app-bg)' }}>
            {/* Breadcrumb */}
            {selected && (
              <div style={{ padding:'5px 14px', borderBottom:'1px solid var(--border-1)',
                background:'var(--sidebar-bg)', flexShrink:0,
                fontSize:10, color:'var(--text-4)', display:'flex', alignItems:'center', gap:6 }}>
                <span style={{ color:'var(--text-5)' }}>{selected.sectionId}</span>
                <span style={{ color:'var(--text-6)' }}>/</span>
                <span style={{ color:'var(--text-3)' }}>{selected.name}</span>
              </div>
            )}
            {renderContent()}
          </div>
        </div>

        {/* Run Panel overlay */}
        {runCase && (
          <RunPanel
            caseId={runCase.caseId}
            specFile={runCase.specFile}
            grepPattern={runCase.grepPattern}
            onClose={() => setRunCase(null)}
          />
        )}
      </div>
    );
  }

  // ─── BOOTSTRAP ────────────────────────────────────────────────────────────────
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);

  </script>
</body>
</html>
