<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Case Browser</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #080c14; font-family: 'IBM Plex Mono', monospace; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #06090f; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    select option { background: #0f172a; color: #e2e8f0; }
    textarea, input { font-family: 'IBM Plex Mono', monospace; }
    .md h1 { font-size: 20px; color: #f1f5f9; margin: 20px 0 10px; border-bottom: 1px solid #1e293b; padding-bottom: 6px; }
    .md h2 { font-size: 16px; color: #e2e8f0; margin: 16px 0 8px; }
    .md h3 { font-size: 13px; color: #cbd5e1; margin: 14px 0 6px; }
    .md p  { font-size: 13px; color: #94a3b8; line-height: 1.7; margin: 6px 0; }
    .md ul, .md ol { padding-left: 20px; color: #94a3b8; font-size: 13px; line-height: 1.7; }
    .md li { margin: 3px 0; }
    .md code { background: #1e293b; color: #60a5fa; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: inherit; }
    .md pre  { background: #0a0f1a; border: 1px solid #1e293b; padding: 14px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
    .md pre code { background: none; padding: 0; color: #94a3b8; }
    .md a    { color: #60a5fa; }
    .md blockquote { border-left: 2px solid #334155; padding-left: 12px; color: #64748b; margin: 8px 0; }
    .md table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; }
    .md th   { background: #0a0f1a; padding: 6px 10px; text-align: left; color: #475569; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e293b; }
    .md td   { padding: 6px 10px; color: #94a3b8; border-bottom: 1px solid #0f172a; }
    .md strong { color: #e2e8f0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  const STATUS_OPTIONS = ['Passed', 'Failed', 'On Test', 'Need to Test', ''];
  const ENV = ['DEV', 'Staging', 'Prod'];
  const SCHEMA_VERSION = 1;

  const STATUS_STYLE = {
    'passed':       { bg: '#052e16', fg: '#4ade80', bd: '#166534' },
    'failed':       { bg: '#2d0e0e', fg: '#f87171', bd: '#7f1d1d' },
    'on test':      { bg: '#0c1a3a', fg: '#60a5fa', bd: '#1e3a5f' },
    'need to test': { bg: '#2a1a04', fg: '#fbbf24', bd: '#713f12' },
  };
  function sStyle(val = '') {
    const s = STATUS_STYLE[(val||'').toLowerCase().trim()] || { bg:'#0f172a', fg:'#334155', bd:'#1e293b' };
    return { background:s.bg, color:s.fg, border:`1px solid ${s.bd}`, padding:'2px 9px', borderRadius:20, fontSize:10, fontWeight:700, whiteSpace:'nowrap', display:'inline-block' };
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  function nowISO() { return new Date().toISOString(); }
  function fmtDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }
  function uid() { return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  // ─── MODELS ──────────────────────────────────────────────────────────────────
  // Execution result row (per expected-result row)
  const EMPTY_EXEC_ROW = (rowKey = '1') => ({
    rowKey,
    actual: '',
    status: { DEV: '', Staging: '', Prod: '' },
  });

  // Execution state for one test case
  const EMPTY_EXEC = (count = 1) => ({
    notes: '',
    overallStatus: { DEV: '', Staging: '', Prod: '' },
    results: Array.from({ length: count }, (_, i) => EMPTY_EXEC_ROW(String(i + 1))),
    updatedAt: null,
  });

  // Full test case object used in UI state
  const EMPTY_TC = () => ({
    // ── definition (from TSV) ──
    id: '', scenario: '', precondition: '', description: '', url: '',
    testType: 'POSITIVE', tester: '', createdBy: '', createDate: '',
    steps: [''],
    expectedResults: [{ key: '1', expected: '' }],
    // ── execution (from JSON) ──
    exec: EMPTY_EXEC(1),
    history: [],
    // ── internal flags (cleared after save) ──
    // _isReset, _resetReason
  });

  // ─── PARSERS ─────────────────────────────────────────────────────────────────
  function parseLine(line, sep = '\t') {
    const out = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch === sep && !inQ) { out.push(cur); cur=''; }
      else cur += ch;
    }
    out.push(cur);
    return out;
  }

  function isCardFmt(lines) { return lines.slice(0,30).some(l => l[0]==='Test ID'); }

  // parseBlock: extracts DEFINITION fields + _legacyExec (execution embedded in TSV)
  // _legacyExec is only used as fallback when no JSON execution file exists yet
  function parseBlock(rows) {
    const tc = {
      id:'', scenario:'', precondition:'', description:'', url:'',
      testType:'POSITIVE', tester:'', createdBy:'', createDate:'',
      steps: [],
      expectedResults: [],
      exec: null,   // will be filled by mergeExecIntoCases
      history: [],
      _legacyExec: {
        notes: '',
        overallStatus: { DEV:'', Staging:'', Prod:'' },
        results: [],
      },
    };
    let inResults = false;

    for (const c of rows) {
      while (c.length < 11) c.push('');
      if (!c.some(x => x.trim())) continue;
      switch (c[0]) {
        case 'Test ID':
          tc.id = c[1]||'';
          if (c[5]==='Note:') tc._legacyExec.notes = c[6]||'';
          tc._legacyExec.overallStatus.DEV      = c[8]||'';
          tc._legacyExec.overallStatus.Staging  = c[9]||'';
          tc._legacyExec.overallStatus.Prod     = c[10]||'';
          break;
        case 'Create at':
          tc.createDate=c[3]||''; tc.createdBy=c[6]||''; tc.tester=c[8]||'';
          break;
        case 'Scenario':
          tc.scenario=c[3]||''; tc.precondition=c[6]||'';
          break;
        case 'Url':
          tc.url=c[3]||''; tc.description=c[6]||'';
          break;
        case 'Steps':
          tc.testType=c[6]||'';
          if (c[3]) tc.steps.push(c[3]);
          break;
        default:
          if (!c[0]) {
            if (c[5]==='Status Response') { inResults=true; }
            else if (!inResults && c[2] && c[3]) { tc.steps.push(c[3]); }
            else if (inResults && c[6]) {
              const rowKey = String(tc.expectedResults.length + 1);
              tc.expectedResults.push({ key: rowKey, expected: c[6]||'' });
              tc._legacyExec.results.push({
                rowKey,
                actual: c[7]||'',
                status: { DEV: c[8]||'', Staging: c[9]||'', Prod: c[10]||'' },
              });
            }
          }
      }
    }

    if (tc.steps.length === 0) tc.steps = [''];
    if (tc.expectedResults.length === 0) tc.expectedResults = [{ key:'1', expected:'' }];
    return tc;
  }

  function parseCardFormat(lines) {
    const cases = []; let i = 0;
    while (i < lines.length) {
      if (lines[i][0]==='Test ID') {
        let j = i+1;
        while (j < lines.length && lines[j][0]!=='Test ID') j++;
        cases.push(parseBlock(lines.slice(i,j))); i=j;
      } else i++;
    }
    return cases;
  }

  function parseFlatFormat(lines) {
    const ne = lines.filter(l => l.some(c=>c.trim()));
    return ne.length ? { headers:ne[0], rows:ne.slice(1) } : { headers:[], rows:[] };
  }

  function parseFile(text, ext) {
    const sep = ext==='csv' ? ',' : '\t';
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').map(l=>parseLine(l,sep));
    const ne = lines.filter(l=>l.some(c=>c.trim()));
    if (!ne.length) return { type:'empty' };
    if (isCardFmt(ne)) return { type:'card', cases:parseCardFormat(ne) };
    return { type:'flat', ...parseFlatFormat(ne) };
  }

  // ─── VERSION HELPERS ─────────────────────────────────────────────────────────
  // Resolve active version name from exec JSON (supports old flat format)
  function getActiveVersion(execData) {
    if (!execData) return 'v1';
    if (execData.activeVersion) return execData.activeVersion;
    if (execData.cases && !execData.versions) return 'v1'; // old flat format
    const keys = Object.keys(execData.versions || {});
    return keys.length > 0 ? keys[keys.length - 1] : 'v1';
  }

  // Resolve version-specific cases map (handles old flat format as 'v1')
  function getVersionCases(execData, versionId) {
    if (!execData) return null;
    if (execData.versions?.[versionId]?.cases) return execData.versions[versionId].cases;
    // Old flat format: treat as 'v1'
    if (!execData.versions && execData.cases && versionId === 'v1') return execData.cases;
    return null; // version exists in JSON but no cases yet (new version)
  }

  // ─── MERGE: definition (TSV) + execution (JSON, version-aware) ───────────────
  function mergeExecIntoCases(cases, execData, versionId) {
    const hasJsonFile = execData !== null;
    const versionCases = getVersionCases(execData, versionId);

    return cases.map(tc => {
      const execCase = versionCases?.[tc.id];

      if (execCase?.current) {
        // JSON data exists for this version → use it
        const cur = execCase.current;
        const execResults = tc.expectedResults.map(er => {
          const found = (cur.results||[]).find(r => r.rowKey===er.key);
          return found
            ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'', Staging:'', Prod:'', ...found.status } }
            : EMPTY_EXEC_ROW(er.key);
        });
        return {
          ...tc,
          exec: {
            notes: cur.notes||'',
            overallStatus: { DEV:'', Staging:'', Prod:'', ...cur.overallStatus },
            results: execResults,
            updatedAt: cur.updatedAt||null,
          },
          history: execCase.history||[],
        };
      }

      if (!hasJsonFile) {
        // No JSON file at all → fall back to legacy TSV execution data
        const leg = tc._legacyExec;
        const execResults = tc.expectedResults.map((er, i) => {
          const found = leg?.results?.[i];
          return found
            ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'', Staging:'', Prod:'', ...found.status } }
            : EMPTY_EXEC_ROW(er.key);
        });
        return {
          ...tc,
          exec: {
            notes: leg?.notes||'',
            overallStatus: { DEV:'', Staging:'', Prod:'', ...(leg?.overallStatus||{}) },
            results: execResults,
            updatedAt: null,
          },
          history: [],
        };
      }

      // JSON file exists but no data for this case in this version → empty exec
      return {
        ...tc,
        exec: EMPTY_EXEC(tc.expectedResults.length),
        history: [],
      };
    });
  }

  // ─── EXEC JSON BUILDER ───────────────────────────────────────────────────────
  // Builds a full snapshot of a TC (definition + execution) for storage in JSON
  function tcToSnapshot(tc) {
    return {
      testType:        tc.testType || '',
      tester:          tc.tester || '',
      createDate:      tc.createDate || '',
      scenario:        tc.scenario || '',
      precondition:    tc.precondition || '',
      description:     tc.description || '',
      url:             tc.url || '',
      steps:           [...(tc.steps || [])],
      expectedResults: (tc.expectedResults || []).map(er => ({ ...er })),
      notes:           tc.exec?.notes || '',
      overallStatus:   { DEV:'', Staging:'', Prod:'', ...(tc.exec?.overallStatus||{}) },
      results:         (tc.exec?.results || []).map(r => ({
        rowKey: r.rowKey,
        actual: r.actual || '',
        status: { DEV:r.status?.DEV||'', Staging:r.status?.Staging||'', Prod:r.status?.Prod||'' },
      })),
      updatedAt: tc.exec?.updatedAt || null,
    };
  }

  function hasAnyChange(oldSnap, newSnap) {
    if (!oldSnap) return true;
    const defFields = ['testType','tester','createDate','scenario','precondition','description','url'];
    for (const f of defFields) {
      if ((oldSnap[f]||'') !== (newSnap[f]||'')) return true;
    }
    const os = oldSnap.steps||[], ns = newSnap.steps||[];
    if (os.length !== ns.length || os.some((s,i) => s !== ns[i])) return true;
    const oe = oldSnap.expectedResults||[], ne = newSnap.expectedResults||[];
    if (oe.length !== ne.length || oe.some((e,i) => (e.expected||'') !== (ne[i]?.expected||''))) return true;
    if ((oldSnap.notes||'') !== (newSnap.notes||'')) return true;
    for (const e of ENV) {
      if ((oldSnap.overallStatus?.[e]||'') !== (newSnap.overallStatus?.[e]||'')) return true;
    }
    const or = oldSnap.results||[], nr = newSnap.results||[];
    if (or.length !== nr.length) return true;
    for (let i=0; i<or.length; i++) {
      if ((or[i].actual||'') !== (nr[i].actual||'')) return true;
      for (const e of ENV) {
        if ((or[i].status?.[e]||'') !== (nr[i].status?.[e]||'')) return true;
      }
    }
    return false;
  }

  function buildExecJSON(cases, prevExecData, sourceFile, sourceFileName, versionId) {
    const now = nowISO();
    const prevVersionCases = getVersionCases(prevExecData, versionId) || {};
    const newCasesMap = {};

    for (const tc of cases) {
      if (!tc.id) continue;
      const prevCase = prevVersionCases[tc.id];
      const oldFull = prevCase?.current || null;
      const newFull = tcToSnapshot(tc);
      const prevHistory = prevCase?.history || [];
      let newHistory = [...prevHistory];

      if (hasAnyChange(oldFull, newFull)) {
        if (oldFull) {
          newHistory.push({
            eventId: uid(),
            action: tc._isReset ? 'reset' : 'update',
            at: now,
            ...(tc._resetReason ? { reason: tc._resetReason } : {}),
            snapshot: oldFull,
          });
        }
        newFull.updatedAt = now;
      }

      newCasesMap[tc.id] = { testcaseId: tc.id, current: newFull, history: newHistory };
    }

    // Migrate old flat format to versioned structure
    let existingVersions = { ...(prevExecData?.versions || {}) };
    if (!prevExecData?.versions && prevExecData?.cases) {
      existingVersions = { 'v1': { createdAt: prevExecData.createdAt || now, cases: prevExecData.cases } };
    }

    existingVersions[versionId] = {
      createdAt: existingVersions[versionId]?.createdAt || now,
      updatedAt: now,
      cases: newCasesMap,
    };

    return {
      schemaVersion: SCHEMA_VERSION,
      sourceFile:     sourceFile||'',
      sourceFileName: sourceFileName||'',
      createdAt: prevExecData?.createdAt || now,
      updatedAt: now,
      activeVersion: versionId,
      versions: existingVersions,
    };
  }

  // After save, apply newExecData back into cases state (update updatedAt & history)
  function applyExecDataToCases(cases, execData, versionId) {
    const versionCases = getVersionCases(execData, versionId) || {};
    return cases.map(tc => {
      const { _isReset, _resetReason, _legacyExec, ...rest } = tc;
      const ec = versionCases[tc.id];
      if (!ec?.current) return { ...rest };
      const cur = ec.current;
      const execResults = rest.expectedResults.map(er => {
        const found = (cur.results||[]).find(r=>r.rowKey===er.key);
        return found ? { rowKey:er.key, actual:found.actual||'', status:{ DEV:'',Staging:'',Prod:'',...found.status } } : EMPTY_EXEC_ROW(er.key);
      });
      return {
        ...rest,
        exec: {
          notes: cur.notes||'',
          overallStatus: { DEV:'',Staging:'',Prod:'',...cur.overallStatus },
          results: execResults,
          updatedAt: cur.updatedAt||null,
        },
        history: ec.history||[],
      };
    });
  }

  // ─── SERIALIZER: TSV (definition + compat execution for backward read) ────────
  function q(v) { const s=(v||'').replace(/"/g,'""'); return s.includes('\t')||s.includes('\n')||s.includes('"')?`"${s}"`:s; }
  function row(...cols) { return cols.map(q).join('\t'); }

  function serializeCardToTSV(cases) {
    const lines = [];
    const total = cases.length;
    const devCnt = s => cases.filter(c=>(c.exec?.overallStatus?.DEV||'').toLowerCase()===s.toLowerCase()).length;
    lines.push(row('total cases =','','',String(total),'','','','','','',''));
    lines.push(row('DEV','','','','STAGGING','','','PROD','','',''));
    lines.push(row('Passed','','',String(devCnt('Passed')),'Passed','','0','Passed','0','',''));
    lines.push(row('Failed','','',String(devCnt('Failed')),'Failed','','0','Failed','0','',''));
    lines.push(row('Need to test','','',String(devCnt('Need to Test')),'Need to test','','0','Need to test','0','',''));
    lines.push(row('On test','','',String(devCnt('On Test')),'On test','','0','On test','0','',''));
    lines.push(row('No Status','','','0','No Status','','0','No Status','0','',''));

    for (const tc of cases) {
      lines.push('');
      const steps = tc.steps.filter(s=>s.trim());
      const oSt = tc.exec?.overallStatus || { DEV:'',Staging:'',Prod:'' };
      const note = tc.exec?.notes||'';
      lines.push(row('Test ID',tc.id,'','','',note?'Note:':'',note,'',oSt.DEV,oSt.Staging,oSt.Prod));
      lines.push(row('Create at','','',tc.createDate||'','','created by',tc.createdBy||'','Tester',tc.tester||'','',''));
      lines.push(row('Scenario','','',tc.scenario||'','','Pre-Condition',tc.precondition||'','DATE',tc.createDate||'','',''));
      lines.push(row('Url','','',tc.url||'','','Description',tc.description||'','ENV','DEV','Staging','Prod'));

      if (steps.length > 0) {
        lines.push(row('Steps','','1',steps[0],'','test type',tc.testType||'','','','',''));
        for (let i=1;i<steps.length;i++) lines.push(row('','',String(i+1),steps[i],'','','','','','',''));
      }

      const baseN = steps.length+1;
      lines.push(row('','',String(baseN),'','','Status Response','Expected Result','Actual Result','Status','','Status'));
      tc.expectedResults.forEach((er,i) => {
        const execR = tc.exec?.results?.[i];
        lines.push(row('','',String(baseN+1+i),'','','',er.expected,execR?.actual||'',execR?.status?.DEV||'',execR?.status?.Staging||'',execR?.status?.Prod||''));
      });
      lines.push(''); lines.push(''); lines.push('');
    }
    return lines.join('\n');
  }

  // ─── EXEC FILE I/O ────────────────────────────────────────────────────────────
  // Resolves TSV path → execution JSON path
  // versions/2.3.0/login.tsv  →  ['.tcdata','2.3.0','login.execution.json']
  // conversation/login.tsv     →  ['.tcdata','conversation','login.execution.json']
  function resolveExecPathParts(tsvRelPath) {
    const parts = tsvRelPath.split('/');
    const filename = parts[parts.length-1].replace(/\.tsv$/i,'.execution.json');
    const dirParts = parts[0]==='versions'
      ? ['.tcdata', ...parts.slice(1,-1)]
      : ['.tcdata', ...parts.slice(0,-1).filter(Boolean)];
    return [...dirParts, filename];
  }

  async function getNestedHandle(rootHandle, pathParts, create=false) {
    let cur = rootHandle;
    for (const part of pathParts.slice(0,-1)) {
      cur = await cur.getDirectoryHandle(part, { create });
    }
    return { dirHandle:cur, fileName:pathParts[pathParts.length-1] };
  }

  async function loadExecFile(rootHandle, tsvRelPath) {
    try {
      const pp = resolveExecPathParts(tsvRelPath);
      const { dirHandle, fileName } = await getNestedHandle(rootHandle, pp, false);
      const fh = await dirHandle.getFileHandle(fileName);
      return JSON.parse(await (await fh.getFile()).text());
    } catch { return null; }
  }

  async function saveExecFile(rootHandle, tsvRelPath, execData) {
    const pp = resolveExecPathParts(tsvRelPath);
    const { dirHandle, fileName } = await getNestedHandle(rootHandle, pp, true);
    const fh = await dirHandle.getFileHandle(fileName, { create:true });
    await writeFile(fh, JSON.stringify(execData, null, 2));
  }

  // ─── FILE SYSTEM + INDEXEDDB ──────────────────────────────────────────────────
  const SUPPORTED_EXT = /\.(tsv|csv|md|txt)$/i;

  async function scanDir(handle, base='') {
    const entries = [];
    for await (const [name, entry] of handle.entries()) {
      if (name.startsWith('.')) continue; // hide .tcdata
      const path = base ? `${base}/${name}` : name;
      if (entry.kind==='directory') {
        entries.push({ kind:'dir', name, path, handle:entry, children:await scanDir(entry,path) });
      } else if (SUPPORTED_EXT.test(name)) {
        entries.push({ kind:'file', name, path, handle:entry, ext:name.split('.').pop().toLowerCase() });
      }
    }
    return entries.sort((a,b) => { if(a.kind!==b.kind) return a.kind==='dir'?-1:1; return a.name.localeCompare(b.name); });
  }

  function openIDB() {
    return new Promise((res,rej) => {
      const r = indexedDB.open('tcbrowser',2);
      r.onupgradeneeded = e => { const db=e.target.result; if(!db.objectStoreNames.contains('handles')) db.createObjectStore('handles'); };
      r.onsuccess = e => res(e.target.result);
      r.onerror = e => rej(e.target.error);
    });
  }
  async function saveHandleIDB(h) { try { const db=await openIDB(); db.transaction('handles','readwrite').objectStore('handles').put(h,'root'); } catch(e){} }
  async function loadHandleIDB() {
    try { const db=await openIDB(); return new Promise(res=>{ const r=db.transaction('handles','readonly').objectStore('handles').get('root'); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
    catch { return null; }
  }
  async function saveLastFileIDB(path) { try { const db=await openIDB(); db.transaction('handles','readwrite').objectStore('handles').put(path,'lastFile'); } catch(e){} }
  async function loadLastFileIDB() {
    try { const db=await openIDB(); return new Promise(res=>{ const r=db.transaction('handles','readonly').objectStore('handles').get('lastFile'); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
    catch { return null; }
  }
  function findNodeByPath(nodes, targetPath) {
    for (const n of nodes) {
      if (n.kind==='file' && n.path===targetPath) return n;
      if (n.kind==='dir' && n.children) { const f=findNodeByPath(n.children,targetPath); if(f) return f; }
    }
    return null;
  }

  // ─── HISTORY PANEL ────────────────────────────────────────────────────────────
  // Computes field-level diff between two full snapshots (definition + execution)
  function diffAll(before, after) {
    const changes = [];
    if (!before || !after) return changes;

    // Definition fields
    const defMap = [
      ['Test Type',     'testType'],
      ['Tester',        'tester'],
      ['Date',          'createDate'],
      ['Scenario',      'scenario'],
      ['Pre-Condition', 'precondition'],
      ['Description',   'description'],
      ['URL',           'url'],
    ];
    for (const [label, key] of defMap) {
      const bv = before[key]||'', av = after[key]||'';
      if (bv !== av) changes.push({ field:label, from:bv, to:av, type:'text' });
    }

    // Steps
    const bs = before.steps||[], as_s = after.steps||[];
    const maxS = Math.max(bs.length, as_s.length);
    for (let i=0; i<maxS; i++) {
      const bv = bs[i]||'', av = as_s[i]||'';
      if (bv !== av) changes.push({ field:`Step ${i+1}`, from:bv, to:av, type:'text' });
    }

    // Expected results (definition)
    const be = before.expectedResults||[], ae = after.expectedResults||[];
    const maxE = Math.max(be.length, ae.length);
    for (let i=0; i<maxE; i++) {
      const bv = be[i]?.expected||'', av = ae[i]?.expected||'';
      const rk = be[i]?.key || ae[i]?.key || String(i+1);
      if (bv !== av) changes.push({ field:`Expected ${rk}`, from:bv, to:av, type:'text' });
    }

    // Overall status per env
    for (const e of ENV) {
      const bv = before.overallStatus?.[e]||'', av = after.overallStatus?.[e]||'';
      if (bv !== av) changes.push({ field:`Overall ${e}`, from:bv, to:av, type:'status' });
    }

    // Notes
    const bn = before.notes||'', an = after.notes||'';
    if (bn !== an) changes.push({ field:'Notes', from:bn, to:an, type:'text' });

    // Results: actual + status per row
    const br = before.results||[], ar = after.results||[];
    const maxR = Math.max(br.length, ar.length);
    for (let i=0; i<maxR; i++) {
      const bRow = br[i]||{}, aRow = ar[i]||{};
      const rk = bRow.rowKey || aRow.rowKey || String(i+1);
      if ((bRow.actual||'') !== (aRow.actual||''))
        changes.push({ field:`Row ${rk} Actual`, from:bRow.actual||'', to:aRow.actual||'', type:'text' });
      for (const e of ENV) {
        const bst = bRow.status?.[e]||'', ast = aRow.status?.[e]||'';
        if (bst !== ast) changes.push({ field:`Row ${rk} ${e}`, from:bst, to:ast, type:'status' });
      }
    }

    return changes;
  }

  }

  function HistoryPanel({ history, currentSnapshot }) {
    const [open, setOpen] = useState(false);
    if (!history || history.length === 0) return null;

    // Build entries with afterState: entry[i]'s afterState = entry[i+1].snapshot or currentSnapshot
    const withAfter = history.map((evt, i) => ({
      ...evt,
      afterState: history[i + 1]?.snapshot ?? currentSnapshot ?? null,
    }));
    // Display in reverse chronological order (most recent first)
    const displayed = [...withAfter].reverse();

    return (
      <div style={{ marginTop:10, border:'1px solid #1e293b', borderRadius:6, overflow:'hidden' }}>
        <div onClick={()=>setOpen(o=>!o)}
          style={{ padding:'6px 12px', cursor:'pointer', display:'flex', alignItems:'center', gap:8, background:'#0a0f1a', userSelect:'none' }}>

            {open?'▼':'▶'} History ({history.length} entr{history.length===1?'y':'ies'})
          </span>
        </div>
        {open && (
          <div>
            {displayed.map((evt, i) => {
              const changes = diffAll(evt.snapshot, evt.afterState);
              return (
                <div key={evt.eventId||i} style={{ padding:'10px 14px', borderTop:'1px solid #0a0f1a', background:i%2===0?'transparent':'#06090f' }}>
                  {/* Header row */}

                    <span style={{ fontSize:9, padding:'1px 8px', borderRadius:10,
                      background:evt.action==='reset'?'#2a1a04':'#060d1c',
                      color:evt.action==='reset'?'#fbbf24':'#60a5fa',
                      border:`1px solid ${evt.action==='reset'?'#713f12':'#1e3a5f'}` }}>

                    <span style={{ fontSize:9, color:'#1e293b', marginLeft:'auto' }}>
                      {changes.length} field{changes.length!==1?'s':''} changed
                    </span>
                  </div>
                  {/* Diff table */}
                  {changes.length > 0
                    ? (
                      <div style={{ background:'#080c14', borderRadius:4, padding:'6px 10px', border:'1px solid #1e2d45' }}>
                        {changes.map((c, ci) => <DiffRow key={ci} change={c} />)}
                      </div>
                    )
                    : (
                      <div style={{ fontSize:10, color:'#334155', fontStyle:'italic' }}>
                        (no diff data — snapshot only)
                      </div>
                    )
                  }
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ─── CARD EDITOR ─────────────────────────────────────────────────────────────
  function CardEditor({ cases:initCases, execData:initExecData, initialVersion, fileHandle, rootHandle, filePath }) {
    const [cases, setCases]               = useState(initCases);
    const [execData, setExecData]         = useState(initExecData);
    const [activeVersion, setActiveVersion] = useState(initialVersion || 'v1');
    const [addingVer, setAddingVer]       = useState(false);
    const [newVerName, setNewVerName]     = useState('');
    const [expanded, setExpanded]         = useState(null);
    const [search, setSearch]             = useState('');
    const [fStatus, setFStatus]           = useState('All');
    const [env, setEnv]                   = useState('DEV');
    const [dirty, setDirty]               = useState(false);
    const [saving, setSaving]             = useState(false);
    const [saveMsg, setSaveMsg]           = useState('');
    const [resetIdx, setResetIdx]         = useState(null);

    // In-memory stash: { [versionId]: cases[] }
    // Allows switching versions freely without saving — current version is stashed before switching
    const { useRef } = React;
    const stashRef = useRef({});

    useEffect(()=>{
      stashRef.current = {};  // clear stash on new file
      setCases(initCases); setExecData(initExecData);
      setActiveVersion(initialVersion || 'v1');
      setDirty(false);
    }, [initCases]);

    // ── version helpers ──
    function allVersionNames() {
      // Saved versions (from JSON) + any unsaved versions currently in stash or active
      const saved = execData?.versions
        ? Object.keys(execData.versions)
        : (execData?.cases ? ['v1'] : []);
      const unsaved = [...Object.keys(stashRef.current), activeVersion];
      const result = [...saved];
      for (const v of unsaved) { if (!result.includes(v)) result.push(v); }
      return result;
    }
    function suggestNextVer() {
      const vers = allVersionNames();
      const last = vers[vers.length - 1] || 'v1';
      const m = last.match(/^(.*?)(\d+)$/);
      return m ? m[1] + (parseInt(m[2]) + 1) : last + '-2';
    }
    function switchVersion(ver) {
      if (ver === activeVersion) return;
      // Stash current version's in-memory state before leaving
      stashRef.current[activeVersion] = cases;
      // Restore target version: stash first, then saved JSON, then empty
      const stashed = stashRef.current[ver];
      if (stashed) {
        setCases(stashed);
      } else {
        setCases(mergeExecIntoCases(cases, execData, ver));
      }
      setActiveVersion(ver);
    }
    function openAddVer() { setNewVerName(suggestNextVer()); setAddingVer(true); }
    function confirmAddVer() {
      const name = newVerName.trim();
      if (!name) return;
      if (allVersionNames().includes(name)) { alert('Version sudah ada.'); return; }
      // Stash current version before creating new one
      stashRef.current[activeVersion] = cases;
      // New version: copy definition, reset all exec fields
      const resetCases = cases.map(tc => ({
        ...tc,
        exec: EMPTY_EXEC(tc.expectedResults.length),
        history: [],
      }));
      setCases(resetCases);
      setActiveVersion(name);
      setAddingVer(false); setNewVerName('');
      setDirty(true);
    }

    // ── state helpers ──
    function upd(i, fn) { setCases(p=>{ const n=[...p]; n[i]=fn({...n[i]}); return n; }); setDirty(true); }

    // Definition
    function updDef(i, f, v) { upd(i, tc=>({...tc,[f]:v})); }
    function updStep(i, si, v) { upd(i, tc=>{ const s=[...tc.steps]; s[si]=v; return {...tc,steps:s}; }); }
    function addStep(i) { upd(i, tc=>({...tc,steps:[...tc.steps,'']})); }
    function delStep(i, si) { upd(i, tc=>({...tc,steps:tc.steps.filter((_,j)=>j!==si)})); }
    function updExpected(i, ri, v) {
      upd(i, tc=>({ ...tc, expectedResults:tc.expectedResults.map((e,j)=>j!==ri?e:{...e,expected:v}) }));
    }
    function addExpected(i) {
      upd(i, tc=>{
        const rk = String(tc.expectedResults.length+1);
        return { ...tc,
          expectedResults:[...tc.expectedResults,{key:rk,expected:''}],
          exec:{...tc.exec, results:[...tc.exec.results, EMPTY_EXEC_ROW(rk)]},
        };
      });
    }
    function delExpected(i, ri) {
      upd(i, tc=>({
        ...tc,
        expectedResults: tc.expectedResults.filter((_,j)=>j!==ri),
        exec:{...tc.exec, results:tc.exec.results.filter((_,j)=>j!==ri)},
      }));
    }

    // Execution
    function updNotes(i, v) { upd(i, tc=>({...tc,exec:{...tc.exec,notes:v}})); }
    function updOverall(i, e, v) { upd(i, tc=>({...tc,exec:{...tc.exec,overallStatus:{...tc.exec.overallStatus,[e]:v}}})); }
    function updActual(i, ri, v) {
      upd(i, tc=>({...tc,exec:{...tc.exec,results:tc.exec.results.map((r,j)=>j!==ri?r:{...r,actual:v})}}));
    }
    function updResultStatus(i, ri, e, v) {
      upd(i, tc=>({...tc,exec:{...tc.exec,results:tc.exec.results.map((r,j)=>j!==ri?r:{...r,status:{...r.status,[e]:v}})}}));
    }

    function addCase() {
      const maxNum = cases.reduce((m,c)=>{ const x=c.id.match(/(\d+)$/); return x?Math.max(m,parseInt(x[1])):m; },0);
      const prefix = cases[0]?.id.replace(/-\d+$/,'')||'TC';
      const nc = { ...EMPTY_TC(), id:`${prefix}-${String(maxNum+1).padStart(3,'0')}` };
      setCases(p=>[...p,nc]); setDirty(true); setExpanded(cases.length);
    }
    function delCase(i) {
      if(!confirm('Hapus test case ini?')) return;
      setCases(p=>p.filter((_,j)=>j!==i)); setDirty(true); setExpanded(null);
    }

    function doReset(i, reason) {
      setResetIdx(null);
      upd(i, tc=>({
        ...tc,
        exec: {
          notes:'',
          overallStatus:{ DEV:'',Staging:'',Prod:'' },
          results: tc.expectedResults.map(er=>EMPTY_EXEC_ROW(er.key)),
          updatedAt: nowISO(),
        },
        _isReset: true,
        _resetReason: reason||'',
      }));
    }

    async function save() {
      setSaving(true);
      try {
        await writeFile(fileHandle, serializeCardToTSV(cases));

        if (rootHandle && filePath) {
          const srcName = filePath.split('/').pop();
          const newExec = buildExecJSON(cases, execData, filePath, srcName, activeVersion);
          await saveExecFile(rootHandle, filePath, newExec);
          const updCases = applyExecDataToCases(cases, newExec, activeVersion);
          setCases(updCases);
          setExecData(newExec);
        } else {
          setCases(p=>p.map(tc=>{ const {_isReset,_resetReason,_legacyExec,...r}=tc; return r; }));
        }

        setDirty(false);
        setSaveMsg('Saved ✓'); setTimeout(()=>setSaveMsg(''),2500);
      } catch(e) { setSaveMsg('Error: '+e.message); }
      setSaving(false);
    }

    function copyTSV() {
      navigator.clipboard.writeText(serializeCardToTSV(cases));
      setSaveMsg('Copied!'); setTimeout(()=>setSaveMsg(''),2000);
    }

    const counts = STATUS_OPTIONS.filter(Boolean).reduce((acc,s)=>({
      ...acc,[s]:cases.filter(c=>(c.exec?.overallStatus?.[env]||'')===s).length,
    }),{});

    const filtered = cases.filter(c => {
      if (search) { const q=search.toLowerCase(); if(!c.id.toLowerCase().includes(q)&&!c.scenario.toLowerCase().includes(q)) return false; }
      if (fStatus!=='All' && (c.exec?.overallStatus?.[env]||'')!==fStatus) return false;
      return true;
    });

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>

        {resetIdx!==null && (
          <ResetModal
            onConfirm={reason=>doReset(resetIdx,reason)}
            onCancel={()=>setResetIdx(null)}
          />
        )}

        {/* Toolbar */}
        <div style={{ padding:'8px 14px', borderBottom:'1px solid #1e293b', background:'#06090f', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap', flexShrink:0 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ID / scenario..."
            style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:'1px solid #1e293b', background:'#0f172a', color:'#e2e8f0', outline:'none', width:200 }} />
          <div style={{ display:'flex', gap:3 }}>
            {['All','Passed','Failed','Need to Test','On Test'].map(s=>(
              <button key={s} onClick={()=>setFStatus(s===fStatus?'All':s)}
                style={{ fontSize:10, padding:'3px 9px', borderRadius:12, border:'1px solid', cursor:'pointer',
                  background:fStatus===s?'#3b82f6':'transparent', borderColor:fStatus===s?'#3b82f6':'#1e293b', color:fStatus===s?'#fff':'#475569' }}>
                {s}{s!=='All'?` ${counts[s]||0}`:` ${cases.length}`}
              </button>
            ))}
          </div>
          <div style={{ display:'flex', gap:3 }}>
            {ENV.map(e=>(
              <button key={e} onClick={()=>setEnv(e)}
                style={{ fontSize:10, padding:'3px 9px', borderRadius:12, border:'1px solid', cursor:'pointer',
                  background:env===e?'#7c3aed':'transparent', borderColor:env===e?'#7c3aed':'#1e293b', color:env===e?'#fff':'#475569' }}>
                {e}
              </button>
            ))}
          </div>

          {/* ── Version picker ── */}
          <div style={{ display:'flex', gap:5, alignItems:'center', borderLeft:'1px solid #1e293b', paddingLeft:8 }}>
            <span style={{ fontSize:9, color:'#334155', textTransform:'uppercase', letterSpacing:1 }}>VER</span>
            <select
              value={activeVersion}
              onChange={e=>switchVersion(e.target.value)}
              style={{ fontSize:11, padding:'3px 8px', borderRadius:6, border:'1px solid #0d9488', background:'#0f172a', color:'#2dd4bf', outline:'none', cursor:'pointer', fontFamily:'inherit' }}>
              {allVersionNames().map(ver=>(
                <option key={ver} value={ver}>{ver}{stashRef.current[ver] ? ' *' : ''}</option>
              ))}
            </select>
            {addingVer ? (
              <div style={{ display:'flex', gap:4, alignItems:'center' }}>
                <input
                  value={newVerName}
                  onChange={e=>setNewVerName(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') confirmAddVer(); if(e.key==='Escape') setAddingVer(false); }}
                  autoFocus
                  placeholder="nama version..."
                  style={{ fontSize:10, padding:'3px 8px', borderRadius:6, border:'1px solid #0d9488', background:'#0f172a', color:'#e2e8f0', outline:'none', width:100, fontFamily:'inherit' }}
                />
                <button onClick={confirmAddVer} style={{ fontSize:12, background:'none', border:'none', color:'#4ade80', cursor:'pointer', padding:0 }}>✓</button>
                <button onClick={()=>setAddingVer(false)} style={{ fontSize:12, background:'none', border:'none', color:'#f87171', cursor:'pointer', padding:0 }}>✕</button>
              </div>
            ) : (
              <button onClick={openAddVer}
                style={{ fontSize:11, padding:'2px 9px', borderRadius:6, border:'1px solid #1e293b', background:'transparent', color:'#475569', cursor:'pointer' }}>
                + New
              </button>
            )}
          </div>

          <span style={{ fontSize:10, color:'#334155' }}>{filtered.length}/{cases.length}</span>
          <div style={{ marginLeft:'auto', display:'flex', gap:6, alignItems:'center' }}>
            {saveMsg && <span style={{ fontSize:11, color:saveMsg.startsWith('Error')?'#f87171':'#4ade80' }}>{saveMsg}</span>}
            <Btn onClick={copyTSV} color='#334155'>📋 Copy TSV</Btn>
            {fileHandle && (
              <Btn onClick={save} bg={dirty?'#3b82f6':'#1e293b'} color={dirty?'#3b82f6':'#334155'}>
                {saving?'Saving…':dirty?'💾 Save':'✓ Saved'}
              </Btn>
            )}
            <Btn onClick={addCase} bg='#059669' color='#059669'>+ Add Case</Btn>
          </div>
        </div>

        {/* Stats bar */}
        <div style={{ display:'flex', borderBottom:'1px solid #0f172a', flexShrink:0 }}>
          {[['Passed','#4ade80'],['Failed','#f87171'],['On Test','#60a5fa'],['Need to Test','#fbbf24']].map(([k,c])=>(
            <div key={k} style={{ flex:1, padding:'7px 4px', textAlign:'center' }}>
              <div style={{ fontSize:16, fontWeight:700, color:c }}>{counts[k]||0}</div>
              <div style={{ fontSize:9, color:'#334155' }}>{k}</div>
            </div>
          ))}
          <div style={{ flex:1, padding:'7px 4px', textAlign:'center' }}>
            <div style={{ fontSize:16, fontWeight:700, color:'#e2e8f0' }}>{cases.length}</div>
            <div style={{ fontSize:9, color:'#334155' }}>Total</div>
          </div>
        </div>

        {/* Table header */}
        <div style={{ display:'grid', gridTemplateColumns:'110px 1fr 150px 120px 36px', padding:'5px 14px', fontSize:10, color:'#334155', textTransform:'uppercase', letterSpacing:1, borderBottom:'1px solid #1e293b', background:'#0a0f1a', flexShrink:0 }}>
          <div>Test ID</div><div>Scenario</div><div>Status ({env})</div><div>Updated</div><div></div>
        </div>

        {/* Rows */}
        <div style={{ flex:1, overflowY:'auto' }}>
          {filtered.map(tc => {
            const gi = cases.indexOf(tc);
            const isOpen = expanded===gi;
            const oSt = tc.exec?.overallStatus?.[env]||'';
            return (
              <div key={gi} style={{ borderBottom:'1px solid #0a0f1a' }}>
                {/* Compact row */}
                <div onClick={()=>setExpanded(isOpen?null:gi)}
                  style={{ display:'grid', gridTemplateColumns:'110px 1fr 150px 120px 36px', padding:'7px 14px', alignItems:'center', cursor:'pointer',
                    background:isOpen?'#0d1b30':'transparent', borderLeft:isOpen?'2px solid #3b82f6':'2px solid transparent' }}>
                  <div style={{ fontSize:11, color:'#60a5fa', fontWeight:600 }}>{tc.id||'—'}</div>
                  <div style={{ fontSize:12, color:'#e2e8f0', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', paddingRight:12 }}>
                    {tc.scenario||tc.description||'—'}
                    {tc.exec?.notes && <span style={{ fontSize:10, color:'#fbbf24', marginLeft:8 }}>⚠ {tc.exec.notes}</span>}
                  </div>
                  <div onClick={e=>e.stopPropagation()}>
                    <StatusSelect value={oSt} onChange={v=>updOverall(gi,env,v)} />
                  </div>
                  <div style={{ fontSize:9, color:'#334155' }}>{fmtDate(tc.exec?.updatedAt)}</div>
                  <div style={{ fontSize:11, color:'#334155', textAlign:'center', userSelect:'none' }}>{isOpen?'▲':'▼'}</div>
                </div>

                {/* Expanded */}
                {isOpen && (
                  <div style={{ background:'#0c1524', padding:'16px 18px', borderLeft:'2px solid #3b82f6', borderTop:'1px solid #1e2d45' }}>

                    {/* ── DEFINITION ── */}
                    <div style={{ fontSize:9, color:'#1e4d8c', textTransform:'uppercase', letterSpacing:1, marginBottom:10, padding:'3px 9px', background:'#060d1c', borderRadius:4, display:'inline-block', border:'1px solid #0c2044' }}>
                      📋 Definition
                    </div>

                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12, marginBottom:12 }}>
                      <Field label="Test ID"><TInput value={tc.id} onChange={v=>updDef(gi,'id',v)}/></Field>
                      <Field label="Test Type"><TInput value={tc.testType} onChange={v=>updDef(gi,'testType',v)}/></Field>
                      <Field label="Tester"><TInput value={tc.tester} onChange={v=>updDef(gi,'tester',v)}/></Field>
                      <Field label="Date"><TInput value={tc.createDate} onChange={v=>updDef(gi,'createDate',v)}/></Field>
                    </div>

                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:12 }}>
                      <Field label="Scenario"><TArea value={tc.scenario} onChange={v=>updDef(gi,'scenario',v)} rows={2}/></Field>
                      <Field label="Pre-Condition"><TArea value={tc.precondition} onChange={v=>updDef(gi,'precondition',v)} rows={2}/></Field>
                      <Field label="Description"><TArea value={tc.description} onChange={v=>updDef(gi,'description',v)} rows={2}/></Field>
                    </div>

                    {/* Steps */}
                    <div style={{ marginBottom:12 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                        <div style={{ fontSize:9, color:'#334155', textTransform:'uppercase', letterSpacing:1 }}>Steps</div>
                        <button onClick={()=>addStep(gi)} style={{ fontSize:10, padding:'1px 8px', borderRadius:6, border:'1px solid #1e3a5f', background:'transparent', color:'#60a5fa', cursor:'pointer' }}>+ Step</button>
                      </div>
                      {tc.steps.map((s,si)=>(
                        <div key={si} style={{ display:'flex', gap:6, alignItems:'center', marginBottom:4 }}>
                          <span style={{ fontSize:10, color:'#334155', width:18, flexShrink:0 }}>{si+1}.</span>
                          <input value={s} onChange={e=>updStep(gi,si,e.target.value)}
                            style={{ flex:1, fontSize:12, padding:'4px 8px', borderRadius:6, border:'1px solid #1e293b', background:'#0f172a', color:'#e2e8f0', outline:'none' }}/>
                          <button onClick={()=>delStep(gi,si)} style={{ fontSize:12, background:'none', border:'none', color:'#7f1d1d', cursor:'pointer' }}>✕</button>
                        </div>
                      ))}
                    </div>

                    {/* Expected + Actual */}
                    <div style={{ marginBottom:14 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                        <div style={{ fontSize:9, color:'#334155', textTransform:'uppercase', letterSpacing:1 }}>Expected Result & Actual</div>
                        <button onClick={()=>addExpected(gi)} style={{ fontSize:10, padding:'1px 8px', borderRadius:6, border:'1px solid #1e3a5f', background:'transparent', color:'#60a5fa', cursor:'pointer' }}>+ Row</button>
                      </div>
                      <div style={{ border:'1px solid #1e293b', borderRadius:6, overflow:'hidden' }}>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 160px 90px 90px 90px 24px', padding:'5px 10px', background:'#0a0f1a', fontSize:9, color:'#334155', textTransform:'uppercase', letterSpacing:1, gap:6 }}>
                          <div>Expected <span style={{color:'#1e4d8c'}}>(definition)</span></div>
                          <div>Actual / Bug Link <span style={{color:'#1a3a1a'}}>(exec)</span></div>
                          <div>DEV</div><div>Staging</div><div>Prod</div><div></div>
                        </div>
                        {tc.expectedResults.map((er, ri)=>{
                          const execR = tc.exec?.results?.[ri] || EMPTY_EXEC_ROW(er.key);
                          return (
                            <div key={ri} style={{ display:'grid', gridTemplateColumns:'1fr 160px 90px 90px 90px 24px', padding:'5px 10px', borderTop:'1px solid #0a0f1a', gap:6, alignItems:'center' }}>
                              <input value={er.expected} onChange={e=>updExpected(gi,ri,e.target.value)}
                                style={{ fontSize:11, padding:'3px 6px', borderRadius:4, border:'1px solid #0c2044', background:'#060d1c', color:'#60a5fa', outline:'none', width:'100%' }}/>
                              <input value={execR.actual||''} onChange={e=>updActual(gi,ri,e.target.value)} placeholder="actual / url"
                                style={{ fontSize:11, padding:'3px 6px', borderRadius:4, border:'1px solid #1e293b', background:'#080c14', color:(execR.actual||'').startsWith('http')?'#60a5fa':'#e2e8f0', outline:'none', width:'100%' }}/>
                              {ENV.map(e=>(
                                <StatusSelect key={e} value={execR.status?.[e]||''} onChange={v=>updResultStatus(gi,ri,e,v)}/>
                              ))}
                              <button onClick={()=>delExpected(gi,ri)} style={{ fontSize:12, background:'none', border:'none', color:'#7f1d1d', cursor:'pointer', padding:'0 2px' }}>✕</button>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* ── EXECUTION ── */}
                    <div style={{ marginBottom:14 }}>
                      <div style={{ fontSize:9, color:'#14532d', textTransform:'uppercase', letterSpacing:1, marginBottom:8, padding:'3px 9px', background:'#061209', borderRadius:4, display:'inline-block', border:'1px solid #0a2918' }}>
                        🔬 Execution
                        {tc.exec?.updatedAt && <span style={{ marginLeft:10, color:'#334155', fontWeight:400 }}>last updated: {fmtDate(tc.exec.updatedAt)}</span>}
                      </div>
                      <div style={{ padding:'10px 12px', background:'#080c14', borderRadius:6, border:'1px solid #1e293b' }}>
                        <div style={{ display:'flex', gap:12, marginBottom:10, alignItems:'center', flexWrap:'wrap' }}>
                          <div style={{ fontSize:10, color:'#334155', marginRight:4 }}>Overall:</div>
                          {ENV.map(e=>(
                            <div key={e} style={{ display:'flex', alignItems:'center', gap:6 }}>
                              <span style={{ fontSize:10, color:'#475569' }}>{e}</span>
                              <StatusSelect value={tc.exec?.overallStatus?.[e]||''} onChange={v=>updOverall(gi,e,v)}/>
                            </div>
                          ))}
                        </div>
                        <Field label="Notes">
                          <TInput value={tc.exec?.notes||''} onChange={v=>updNotes(gi,v)} placeholder="Catatan testing, bug ref, dll..."/>
                        </Field>
                      </div>
                    </div>

                    {/* History */}
                    <HistoryPanel history={tc.history} currentSnapshot={tcToSnapshot(tc)}/>

                    {/* Actions */}
                    <div style={{ display:'flex', justifyContent:'space-between', marginTop:14 }}>
                      <button onClick={()=>setResetIdx(gi)}
                        style={{ fontSize:11, padding:'4px 14px', borderRadius:6, border:'1px solid #713f12', background:'#150d02', color:'#fbbf24', cursor:'pointer' }}>
                        ↺ Reset Execution Fields
                      </button>
                      <button onClick={()=>delCase(gi)}
                        style={{ fontSize:11, padding:'4px 14px', borderRadius:6, border:'1px solid #7f1d1d', background:'#1c0a0a', color:'#f87171', cursor:'pointer' }}>
                        Delete Case
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          {filtered.length===0 && <div style={{ padding:40, textAlign:'center', color:'#1e293b', fontSize:13 }}>No test cases found.</div>}
        </div>
      </div>
    );
  }

  // ─── FLAT TABLE VIEWER ────────────────────────────────────────────────────────
  function FlatViewer({ headers, rows }) {
    const [search, setSearch] = useState('');
    const filtered = rows.filter(r=>!search||r.some(c=>c.toLowerCase().includes(search.toLowerCase())));
    return (
      <div>
        <div style={{ padding:'8px 14px', borderBottom:'1px solid #1e293b', background:'#06090f' }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
            style={{ fontSize:11, padding:'4px 10px', borderRadius:6, border:'1px solid #1e293b', background:'#0f172a', color:'#e2e8f0', outline:'none', width:240 }}/>
          <span style={{ fontSize:10, color:'#334155', marginLeft:12 }}>{filtered.length} rows</span>
        </div>
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
            <thead><tr>{headers.map((h,i)=><th key={i} style={{ padding:'6px 12px', textAlign:'left', fontSize:10, color:'#475569', fontWeight:600, textTransform:'uppercase', letterSpacing:1, borderBottom:'1px solid #1e293b', background:'#0a0f1a', whiteSpace:'nowrap' }}>{h}</th>)}</tr></thead>
            <tbody>{filtered.map((row,ri)=>(
              <tr key={ri} style={{ borderBottom:'1px solid #0a0f1a', background:ri%2===0?'transparent':'#06090f' }}>
                {headers.map((_,ci)=>{ const v=row[ci]||''; const isSt=/^(passed|failed|on test|need to test)$/i.test(v.trim()); return <td key={ci} style={{ padding:'5px 12px', color:'#94a3b8', whiteSpace:'pre-wrap', verticalAlign:'top' }}>{isSt?<span style={sStyle(v)}>{v}</span>:v}</td>; })}
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    );
  }

  function MarkdownViewer({ content }) {
    return <div className="md" style={{ padding:'24px 32px', maxWidth:860 }} dangerouslySetInnerHTML={{ __html: marked.parse(content) }} />;
  }

  // ─── APP ──────────────────────────────────────────────────────────────────────
  function App() {
    const [tree, setTree]             = useState(null);
    const [dirName, setDirName]       = useState('');
    const [rootHandle, setRootHandle] = useState(null);
    const [selected, setSelected]     = useState(null);
    const [fileData, setFileData]     = useState(null);
    const [loading, setLoading]       = useState(false);
    const [error, setError]           = useState(null);
    const [savedHandle, setSavedHandle] = useState(null);
    const supported = 'showDirectoryPicker' in window;

    useEffect(()=>{
      if(!supported) return;
      (async()=>{
        const h = await loadHandleIDB();
        if(!h) return;
        try {
          const perm = await h.queryPermission({ mode:'readwrite' });
          if(perm==='granted') {
            setRootHandle(h); setDirName(h.name); setLoading(true);
            const newTree = await scanDir(h);
            setTree(newTree); setLoading(false);
            // Auto-reopen last file after page reload (e.g. triggered by Live Server)
            const lastPath = await loadLastFileIDB();
            if (lastPath) {
              const node = findNodeByPath(newTree, lastPath);
              if (node) openFile(node, h);
            }
          } else {
            setSavedHandle(h);
          }
        } catch(e){}
      })();
    },[]);

    async function doOpen(handle) {
      await saveHandleIDB(handle);
      setRootHandle(handle); setSavedHandle(null);
      setDirName(handle.name); setLoading(true);
      const newTree = await scanDir(handle);
      setTree(newTree);
      setSelected(null); setFileData(null); setLoading(false);
      // Auto-reopen last file if available
      const lastPath = await loadLastFileIDB();
      if (lastPath) {
        const node = findNodeByPath(newTree, lastPath);
        if (node) openFile(node, handle);
      }
    }

    async function openFolder() {
      if(!supported) { setError('Gunakan Chrome atau Edge versi terbaru.'); return; }
      try { await doOpen(await window.showDirectoryPicker({ mode:'readwrite' })); }
      catch(e) { if(e.name!=='AbortError') setError(e.message); setLoading(false); }
    }

    async function restoreFolder() {
      try { const p=await savedHandle.requestPermission({ mode:'readwrite' }); if(p==='granted') await doOpen(savedHandle); }
      catch(e) { if(e.name!=='AbortError') setError(e.message); }
    }

    async function openFile(node, rootHandleOverride) {
      const effRoot = rootHandleOverride || rootHandle;
      setSelected(node); setFileData(null); setLoading(true);
      await saveLastFileIDB(node.path);
      try {
        const text = await (await node.handle.getFile()).text();
        if(node.ext==='md'||node.ext==='txt') {
          setFileData({ type:'md', content:text });
        } else {
          const parsed = parseFile(text, node.ext);
          if(parsed.type==='card' && effRoot) {
            const execData = await loadExecFile(effRoot, node.path);
            const activeVersion = getActiveVersion(execData);
            const mergedCases = mergeExecIntoCases(parsed.cases, execData, activeVersion);
            setFileData({ ...parsed, cases:mergedCases, execData:execData||null, activeVersion });
          } else {
            setFileData(parsed);
          }
        }
      } catch(e) { setError(e.message); }
      setLoading(false);
    }


    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100vh', color:'#e2e8f0', background:'#080c14' }}>

        {/* Header */}
        <div style={{ borderBottom:'1px solid #1e293b', padding:'10px 18px', display:'flex', alignItems:'center', gap:10, background:'#080c14', flexShrink:0, zIndex:10 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:10, color:'#334155', letterSpacing:2, textTransform:'uppercase' }}>SatuInbox</div>
            <div style={{ fontSize:16, fontWeight:600, color:'#f1f5f9' }}>
              Test Case Browser
              {dirName && <span style={{ fontSize:11, color:'#334155', fontWeight:400, marginLeft:10 }}>/ {dirName}</span>}
              {selected && <span style={{ fontSize:11, color:'#475569', fontWeight:400, marginLeft:6 }}>/ {selected.path}</span>}
            </div>
          </div>
          {savedHandle && !tree && (
            <button onClick={restoreFolder}
              style={{ fontSize:11, fontWeight:600, padding:'5px 14px', borderRadius:6, border:'1px solid #7c3aed', background:'#1e0b3a', color:'#a78bfa', cursor:'pointer' }}>
              🔑 Restore: /{savedHandle.name}
            </button>
          )}
          <button onClick={openFolder}
            style={{ fontSize:11, fontWeight:600, padding:'5px 14px', borderRadius:6, border:'1px solid', cursor:'pointer',
              background:tree?'transparent':'#3b82f6', borderColor:tree?'#334155':'#3b82f6', color:tree?'#64748b':'#fff' }}>
            {tree?'📂 Change Folder':'📂 Open Folder'}
          </button>
        </div>

        <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

          {/* Sidebar */}
          <div style={{ width:230, borderRight:'1px solid #1e293b', overflowY:'auto', flexShrink:0, background:'#06090f' }}>
            {!tree && !loading && (
              <div style={{ padding:'32px 16px', textAlign:'center', color:'#1e293b' }}>
                <div style={{ fontSize:32, marginBottom:10 }}>📁</div>
                {savedHandle
                  ? <div style={{ fontSize:11, color:'#475569' }}>Klik <strong style={{color:'#a78bfa'}}>Restore</strong> di atas</div>
                  : <div style={{ fontSize:11 }}>Klik <strong>Open Folder</strong><br/>pilih folder Test</div>
                }
                {!supported && <div style={{ marginTop:10, color:'#7f1d1d', fontSize:10 }}>Butuh Chrome / Edge</div>}
              </div>
            )}
            {loading && !tree && <div style={{ padding:24, textAlign:'center', color:'#334155', fontSize:11 }}>Scanning…</div>}
            {tree && (
              <div style={{ padding:'6px 0' }}>
                {tree.length===0 && <div style={{ padding:16, fontSize:11, color:'#334155' }}>Tidak ada file ditemukan.</div>}
                {tree.map(n=><FileNode key={n.path} node={n} selected={selected?.path} onSelect={openFile}/>)}
              </div>
            )}
          </div>

          {/* Content */}
          <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            {error && (
              <div style={{ margin:12, padding:10, background:'#2d0e0e', border:'1px solid #7f1d1d', borderRadius:6, fontSize:11, color:'#f87171', display:'flex', gap:8, flexShrink:0 }}>
                <span style={{ flex:1 }}>⚠ {error}</span>
                <button onClick={()=>setError(null)} style={{ background:'none', border:'none', color:'#f87171', cursor:'pointer' }}>✕</button>
              </div>
            )}

            {!selected && !loading && !error && (
              <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#1e293b' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>📄</div>
                <div style={{ fontSize:14, color:'#334155' }}>Pilih file dari sidebar</div>
                <div style={{ fontSize:11, marginTop:4, color:'#1e293b' }}>Support .tsv .csv .md .txt</div>
                <div style={{ fontSize:10, marginTop:12, color:'#1e2d3a', textAlign:'center', lineHeight:1.7 }}>
                  Execution data tersimpan di <code style={{color:'#1e4d8c'}}>.tcdata/</code><br/>
                  Folder <code style={{color:'#1e293b'}}>.tcdata</code> tidak tampil di sidebar (hidden)
                </div>
              </div>
            )}

            {selected && loading && <div style={{ padding:32, textAlign:'center', color:'#334155', fontSize:11 }}>Loading {selected.name}…</div>}

            {selected && fileData && !loading && (
              <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
                {/* Breadcrumb */}
                <div style={{ padding:'6px 14px', borderBottom:'1px solid #1e293b', background:'#06090f', display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
                  <span style={{ fontSize:11, color:'#60a5fa', fontWeight:600 }}>{selected.name}</span>
                  {fileData.type==='card' && (
                    <>
                      <span style={{ fontSize:10, color:'#334155' }}>{fileData.cases.length} test cases · editable</span>
                      {fileData.execData
                        ? <span style={{ fontSize:9, padding:'1px 8px', borderRadius:10, background:'#052e16', color:'#4ade80', border:'1px solid #166534' }}>✓ {fileData.activeVersion || 'v1'} · {Object.keys(fileData.execData?.versions || {}).length || 1} version(s)</span>
                        : <span style={{ fontSize:9, padding:'1px 8px', borderRadius:10, background:'#2a1a04', color:'#fbbf24', border:'1px solid #713f12' }}>TSV only — save to create JSON</span>
                      }
                    </>
                  )}
                  {fileData.type==='flat' && <span style={{ fontSize:10, color:'#334155' }}>{fileData.rows.length} rows</span>}
                  {fileData.type==='md'   && <span style={{ fontSize:10, color:'#334155' }}>markdown</span>}
                </div>

                <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
                  {fileData.type==='card' && (
                    <CardEditor
                      key={selected?.path}
                      cases={fileData.cases}
                      execData={fileData.execData}
                      initialVersion={fileData.activeVersion || 'v1'}
                      fileHandle={selected.handle}
                      rootHandle={rootHandle}
                      filePath={selected.path}
                    />
                  )}
                  {fileData.type==='flat' && <div style={{ overflowY:'auto', flex:1 }}><FlatViewer headers={fileData.headers} rows={fileData.rows}/></div>}
                  {fileData.type==='md'   && <div style={{ overflowY:'auto', flex:1 }}><MarkdownViewer content={fileData.content}/></div>}
                  {fileData.type==='empty'&& <div style={{ padding:40, textAlign:'center', color:'#334155', fontSize:13 }}>File kosong.</div>}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
